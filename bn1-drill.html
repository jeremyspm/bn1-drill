type":"mcq","options":["they are lighter than an electron","they can conduct electricity","they are used to power the lights in your home","they have no electrons"],"answer":1,"why":"An electrolyte is a substance that dissociates into ions and can conduct electricity.","check":false},{"code":"FLU-45","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"The most abundant electrolytes in the extra-cellular fluid (ECF) are","type":"mcq","options":["potassium and bicarbonate","chlorine and potassium","sodium and potassium","sodium and chloride"],"answer":3,"why":"Sodium and chloride are the most abundant ECF electrolytes.","check":false},{"code":"FLU-46","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"The concentrations of sodium and potassium ions in ECF and ICF are nearly opposite. This is because","type":"mcq","options":["these ions are on different sides of the plasma membrane and reflects the activity of the pumps used in active transport.","these ions must be kept separate at all costs","these ions are both + ions, and so need to be separated as they push each other apart like magnets","these ions reflect the activity of the hydrostatic pressures exerted on cells"],"answer":0,"why":"Na+ (high outside) and K+ (high inside) are kept opposite by the Na+/K+ pump (active transport).","check":false},{"code":"FLU-47","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"The body gets water from","type":"mcq","options":["eating, drinking, metabolism, absorbing water from the environment","absorbing rain and bath water","eating, metabolism and drinking","drinking and metabolism"],"answer":2,"why":"The body gains water by drinking, from food (eating), and from metabolism — not by absorbing it from the environment.","check":false},{"code":"FLU-48","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"An example of an insensible water loss is","type":"mcq","options":["sweating","in the faeces","breathing","urinating"],"answer":2,"why":"Insensible (unnoticed) water loss occurs via breathing and evaporation from skin (sweating/urine are sensible).","check":false},{"code":"FLU-49","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"The release of ADH will cause","type":"mcq","options":["urine to be more dilute","more urine being excreted","no change to urine output","less urine being excreted"],"answer":3,"why":"ADH makes the kidney reabsorb water → less, more concentrated urine.","check":false},{"code":"FLU-50","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"A rise in plasma osmolarity","type":"mcq","options":["will cause ADH production to stop","causes the thirst centre to be stimulated","will cause the kidneys to release large amounts of concentrated urine","will cause the kidneys to release large amounts of diluted urine"],"answer":1,"why":"Rising plasma osmolarity stimulates the thirst centre (and ADH release).","check":false},{"code":"FLU-51","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"The body essentially has a powerful \"water magnet\". This is","type":"mcq","options":["sodium atoms","iron ions","sodium ions","chloride ions"],"answer":2,"why":"Sodium ions are the body's 'water magnet' — water follows salt.","check":false},{"code":"FLU-52","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Which statement is TRUE of anti-diuretic hormone?","type":"mcq","options":["It is activated when a person is dehydrated","It directly controls the salt levels in the body","It is released when a person drinks too much water","It is responsible for the excretion of excessive amounts of water"],"answer":0,"why":"ADH is activated by dehydration (to conserve water).","check":false},{"code":"FLU-53","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Your thirst is quenched the moment","type":"mcq","options":["the kidney nephrons reabsorb water to restore blood volume","water arrives in the stomach and the stretch receptors are activated","water enters the mouth and the throat and these areas are moistened","water is reabsorbed through the digestive system"],"answer":2,"why":"Thirst is relieved the moment the mouth and throat are moistened (before water is even absorbed).","check":false},{"code":"FLU-54","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"A decrease in ECF (extracellular fluid) osmolarity means that","type":"mcq","options":["ADH production stops","PTH production will start","PTH production stops","more ADH is released"],"answer":0,"why":"When ECF osmolarity falls (dilute blood), ADH release stops → more dilute urine.","check":false},{"code":"FLU-55","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Mental confusion is often an earlier sign of","type":"mcq","options":["dehydration","hypoproteinemia","over-hydration","having studied too much"],"answer":0,"why":"Mental confusion is an early sign of dehydration.","check":false},{"code":"FLU-56","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Courtney drinks an extraordinary amount of water very, very quickly.","type":"mcq","options":["The ICF will become more concentrated as a result","The ECF becomes more concentrated and water moves into cells","The ECF concentrations will cause water to move into the cells of the body","The ECF becomes dilute, and water moves into cells causing them to swell"],"answer":3,"why":"Drinking lots of water fast dilutes the ECF, so water moves into cells and they swell (risk of water intoxication).","check":false},{"code":"FLU-57","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Hyponatremia is caused by","type":"mcq","options":["hypotonic hydration","isotonic hydration","hypertonic hydration","dehydration"],"answer":0,"why":"Hyponatraemia (low blood sodium) results from hypotonic (over-)hydration.","check":false},{"code":"FLU-58","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Hypoproteinemia is a condition where you have low levels of proteins in the plasma. This will result in","type":"mcq","options":["impaired circulation","nausea","odema","shrivelled skin"],"answer":2,"why":"Low plasma protein lowers oncotic pull, so fluid stays in tissues = oedema.","check":false},{"code":"FLU-59","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"The most abundant positive (+) electrolyte in the body is","type":"mcq","options":["K⁺","Ca⁺","Na⁺","Cl⁺"],"answer":2,"why":"Na+ is the most abundant positive electrolyte (cation) in the body.","check":false},{"code":"FLU-60","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"High levels of aldosterone will","type":"mcq","options":["increase the amount of sodium reabsorbed by the kidney. As water follows salt, so to speak, a person will also retain fluid in the body","inhibit the reabsorbtion of sodium in the kidney, and excrete the sodium, and as water usually follows salt, water will be excreted too","allow sodium to be reabsorbed, but large amounts of urine will be produced that is very dilute","allow sodium to be excreted but not water, so urine will be really concentrated"],"answer":0,"why":"Aldosterone makes the kidney reabsorb sodium; water follows, so fluid is retained (raises BP).","check":false},{"code":"FLU-61","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Jamie eats a meal with a high salt content. It is likely his blood pressure will","type":"mcq","options":["not be affected","increase, as the salt in the blood, causes water to be drawn into the blood vessels","I can't work this out!","decrease, as the salt causes water to go into body cells"],"answer":1,"why":"A salty meal draws water into the blood, raising blood volume and blood pressure.","check":false},{"code":"FLU-62","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Shallow breathing will result in","type":"mcq","options":["metabolic alkalosis","respiratory alkalosis","metabolic acidosis","respiratory acidosis"],"answer":3,"why":"Shallow breathing (hypoventilation) retains CO2 → respiratory acidosis.","check":false},{"code":"FLU-63","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"An asthmatic might experience","type":"mcq","options":["metabolic alkalosis","respiratory alkalosis","metabolic acidosis","respiratory acidosis"],"answer":3,"why":"An asthma attack traps air and retains CO2 → respiratory acidosis.","check":false},{"code":"PH-1","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"pH","stem":"What does the pH scale measure, which ion does it reflect, what is its range, and which value is neutral?","type":"reveal","answerText":"pH measures how ACIDIC or alkaline a solution is — specifically the concentration of HYDROGEN (H+) ions. The scale runs 0 to 14; 7 is NEUTRAL; below 7 is acidic (more H+); above 7 is alkaline/basic (fewer H+).","why":"Each 1 pH step = a 10-fold change in H+ concentration.","check":false},{"code":"PH-2","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"pH","stem":"Give the approximate pH ranges for a strong acid, a weak acid, neutral, a weak base and a strong base. What is blood's normal pH, and what values define acidosis and alkalosis?","type":"reveal","answerText":"Strong acid ~0–2 (battery acid, gastric acid); weak acid ~5–6; neutral 7 (saliva); weak base ~7–8; strong base ~13–14 (drain cleaner). Blood is normally slightly alkaline, ~7.35–7.45. Acidosis = blood pH below 7.35; alkalosis = above 7.45.","why":"Blood's safe range is tiny — only about 7.35 to 7.45.","check":false},{"code":"PH-3","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"pH","stem":"On the pH scale, is a lower number more or less acidic? Which is more acidic, pH 1 or pH 5? Why can't milk neutralise stomach acid, and what safely can?","type":"reveal","answerText":"Lower pH = MORE acidic, so pH 1 is more acidic than pH 5. Milk is roughly neutral, so it can't cancel acid effectively; a mild ALKALI (base) such as baking soda or milk of magnesia neutralises the excess acid.","why":"A base neutralises an acid; strong bases (drain cleaner) would be dangerous.","check":false},{"code":"PH-4","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"pH","stem":"Universal indicator: what pH does each colour show — red/orange, yellow, green, blue, purple?","type":"reveal","answerText":"Red/orange = strong acid (~1–3); yellow = weak acid (~5–6); green = NEUTRAL (~7); blue = weak base (~8–10); purple/violet = strong base (~11–14).","why":"Warm colours = acid, green = neutral, cool colours = alkaline.","check":false},{"code":"PH-5","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"pH","stem":"Give the best pH environment for salivary amylase, pepsin, and the pancreatic enzymes (amylase/trypsin). What makes the duodenum alkaline, and where does that come from?","type":"reveal","answerText":"Salivary amylase works best in a NEUTRAL mouth. Pepsin works in an ACIDIC stomach (pepsinogen is switched on by acid). Pancreatic amylase and trypsin work in a SLIGHTLY ALKALINE duodenum. The duodenum is made alkaline by BICARBONATE ions from the PANCREAS, which neutralise the stomach acid.","why":"Each enzyme is tuned to the pH of the region it works in.","check":false},{"code":"URIN-1","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Urinary System","stem":"Name the parts of a nephron in the order filtrate flows through them, and what each part does.","type":"reveal","answerText":"Glomerulus (in Bowman's/glomerular capsule) — FILTERS the blood; then the PROXIMAL convoluted tubule — reabsorbs most water, nutrients and salts; the LOOP OF HENLE — concentrates urine (sets up a salt gradient); the DISTAL convoluted tubule — fine-tunes salts; the COLLECTING DUCT — final water reabsorption controlled by ADH.","why":"Filter (glomerulus) then selectively reabsorb the good stuff back.","check":false},{"code":"URIN-2","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Urinary System","stem":"Name the gross structures of the kidney from outer to inner, and what enters and leaves at the hilum.","type":"reveal","answerText":"Outer to inner: CORTEX (outer layer), MEDULLA (the renal pyramids), then urine collects in the renal PELVIS and drains down the URETER. At the hilum: the renal ARTERY brings blood in, the renal VEIN takes it out, and the ureter carries urine out.","why":"Cortex and medulla do the work; pelvis and ureter are the drainage.","check":false},{"code":"URIN-3","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Urinary System","stem":"Define each urinary term: filtration, reabsorption, secretion, micturition, and ADH.","type":"reveal","answerText":"Key urinary terms: FILTRATION = plasma pushed from glomerulus into the capsule; REABSORPTION = useful substances returned to blood; SECRETION = wastes added to the tubule; MICTURITION = urination; ADH = hormone that increases water reabsorption.","why":"","check":false},{"code":"NUTR-1","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"Water is a","type":"reveal","answerText":"Water is an essential (inorganic) NUTRIENT. It's vital for life but provides no energy (no kilojoules).","why":"","check":false},{"code":"NUTR-2","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"Anne puts some white table sugar into her coffee. White table sugar is an example of","type":"reveal","answerText":"White table sugar is a CARBOHYDRATE — specifically the disaccharide sucrose (glucose + fructose).","why":"","check":false},{"code":"NUTR-3","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"When someone suffers malnutrition, they have a deficiency in particular nutrients. Marasmus is an example of malnutrition related to a lack of","type":"reveal","answerText":"Marasmus is protein-ENERGY malnutrition — a lack of overall food energy/calories (and protein). (Kwashiorkor is specifically protein deficiency.)","why":"","check":false},{"code":"NUTR-4","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"The mucus that is produced to lubricate joints is predominantly formed from","type":"reveal","answerText":"Joint/lubricating mucus is built mainly from CARBOHYDRATES — glycoproteins/mucopolysaccharides (e.g. hyaluronic acid in synovial fluid).","why":"","check":false},{"code":"NUTR-5","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"Courtney loves coca cola (and the not the sugar free stuff!). This is a very concentrated energy source. We would refer to this as","type":"reveal","answerText":"Concentrated sugary cola = a CONCENTRATED ENERGY SOURCE, i.e. refined carbohydrate ('empty calories').","why":"","check":false},{"code":"NUTR-6","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"Match each nutrient to its main role: carbohydrate, protein, lipid/fat, vitamins & minerals, and water.","type":"reveal","answerText":"Matching nutrients to roles: carbohydrate → energy; protein → growth & repair; lipid/fat → energy store, insulation, membranes; vitamins & minerals → regulate reactions; water → transport/solvent.","why":"","check":false},{"code":"NUTR-7","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"The axon of nerve cells is covered in","type":"reveal","answerText":"The axon is covered in MYELIN — a fatty (lipid) insulating sheath.","why":"","check":false},{"code":"NUTR-8","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"Oils that have been solidified are known as","type":"reveal","answerText":"Solidified oils = (saturated / hydrogenated) FATS — e.g. margarine.","why":"","check":false},{"code":"NUTR-9","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"Calcium is needed for muscle contraction. In the body, one type of Troponin enzyme binds to these calcium ions to help the muscle contract. Troponin is an example of a cardiac enzyme. When Troponin levels are high this might indicate (select all that apply)","type":"reveal","answerText":"Select all — raised troponin indicates CARDIAC MUSCLE DAMAGE, i.e. a heart attack (myocardial infarction) / cardiac injury.","why":"","check":false},{"code":"NUTR-10","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"Salivary amylase","type":"reveal","answerText":"Salivary amylase is an enzyme in saliva that begins CARBOHYDRATE (starch) digestion, breaking starch into maltose. It works best at a neutral pH in the mouth.","why":"","check":false},{"code":"NUTR-11","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"Which nutrient is made in the large intestine and helps the liver to make proteins that help blood to clot?","type":"reveal","answerText":"Vitamin K — made by bacteria (normal flora) in the large intestine; the liver uses it to make blood-clotting factors.","why":"","check":false},{"code":"NUTR-12","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"When Anne was young her mum told her she needed to eat the crusts of her bread, as this would make her hair curly. Obviously that did not work and is untrue. However, her mum also told her to eat her carrots to help Anne see in the dark. Which of the following statements is correct?","type":"reveal","answerText":"Correct statement: Vitamin A is needed for vision (especially night vision) — so 'carrots help you see in the dark' has a grain of truth.","why":"","check":false},{"code":"NUTR-13","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"Many cell structures and functional substances within the cells are things like collagen, enzymes and haemoglobin. These are primarily made from","type":"reveal","answerText":"Collagen, enzymes and haemoglobin are made from PROTEINS (built from amino acids).","why":"","check":false},{"code":"NUTR-14","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"Triglycerides are made up of","type":"reveal","answerText":"A triglyceride = one GLYCEROL + three FATTY ACIDS.","why":"","check":false},{"code":"NUTR-15","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"Daenerys is pregnant and her baby is overdue. The midwife suggests that Daenerys and her partner Kharl could have sex which might start labor because","type":"reveal","answerText":"Semen contains PROSTAGLANDINS (and sex/orgasm releases OXYTOCIN) — both stimulate uterine contractions, which may help start labour.","why":"","check":false},{"code":"NUTR-16","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"Raymond has a heart attack and needs to have a coronary bypass to get around the plague in the blocked coronary artery. The plaque is caused by","type":"reveal","answerText":"Coronary plaque (atheroma) is caused by CHOLESTEROL / saturated fat building up in the artery wall (atherosclerosis).","why":"","check":false},{"code":"NUTR-17","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"You are working with a patient who is a very strict vegetarian who keeps getting sick over the winter times. You feel they might not be able to produce enough antibodies to fight off these off. You wonder if they are not getting the whole range of amino acids in the body. There are how many different amino acids that are essential in the diet?","type":"reveal","answerText":"There are 9 essential amino acids that must come from the diet (some older texts list 8 for adults; histidine is the 9th).","why":"","check":false},{"code":"NUTR-18","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"A catalyst is something that speeds up reactions. A classic catalyst in the body is","type":"reveal","answerText":"A classic biological catalyst is an ENZYME (a protein that speeds up reactions).","why":"","check":false},{"code":"NUTR-19","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"Freddy goes off to the pub on Friday night to celebrate his 30th birthday. After a few drinks he starts to feel a bit woozy and thinks he needs to have some food to reduce the toxic effects of the alcohol he has had. The best thing from the menu to help reduce this toxicity is","type":"reveal","answerText":"Fatty / protein-rich food is best — it slows the absorption of alcohol from the stomach, reducing its toxic effects.","why":"","check":false},{"code":"NUTR-20","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"One thing that carbohydrates, lipids and proteins have in common is they form","type":"reveal","answerText":"Carbohydrates, lipids and proteins are all ORGANIC (carbon-based) molecules built from smaller building-block units, and all can be used to provide energy.","why":"","check":false},{"code":"NUTR-21","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrients","stem":"Daenny and Kharl welcome their new baby. When the baby is six months old, she isn't meeting growth milestones. The doctor asks Daenny and Kharl about the babys diet and determines the baby is probably low in","type":"reveal","answerText":"The baby is likely low in PROTEIN (needed for growth and meeting developmental milestones).","why":"","check":false},{"code":"NUTN-1","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"In New Zealand, the unit for measuring the amount of energy in food is the","type":"reveal","answerText":"In New Zealand, food energy is measured in KILOJOULES (kJ).","why":"","check":false},{"code":"NUTN-2","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"Select all that apply The major nutrients are:","type":"reveal","answerText":"Select all — the major nutrients are: CARBOHYDRATES, PROTEINS, LIPIDS (fats), VITAMINS, MINERALS and WATER.","why":"","check":false},{"code":"NUTN-3","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"A balanced diet is one where","type":"reveal","answerText":"A balanced diet provides all the nutrients in the right amounts/proportions for the body's needs (with energy in ≈ energy out).","why":"","check":false},{"code":"NUTN-4","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"There are about 50 molecules that the body cannot make fast enough, and these have to be provided for in the diet. These molecules are known as","type":"reveal","answerText":"The ~50 molecules the body can't make fast enough and must get from food are the ESSENTIAL NUTRIENTS.","why":"","check":false},{"code":"NUTN-5","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"A shortage of this molecule can suppress brain function, and lead to death! This molecule is:","type":"reveal","answerText":"GLUCOSE — a shortage suppresses brain function (the brain's main fuel) and can be fatal.","why":"","check":false},{"code":"NUTN-6","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"Glucose is an example of a","type":"reveal","answerText":"Glucose is a CARBOHYDRATE — specifically a monosaccharide (simple sugar).","why":"","check":false},{"code":"NUTN-7","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"Highly refined carbs, such as lollies, and soft drinks provide concentrated energy sources. The term used to describe such foods is","type":"reveal","answerText":"Highly refined carbs (lollies, soft drinks) are called EMPTY CALORIES (concentrated energy, few other nutrients).","why":"","check":false},{"code":"NUTN-8","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"The nutrient that can reduce toxicity of drugs, medications and other substances are","type":"reveal","answerText":"PROTEINS help reduce the toxicity of drugs/substances (the liver's detox enzymes are proteins).","why":"","check":false},{"code":"NUTN-9","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"Consider the structure of the plasma membrane of a cell. Which of the following choices, show all the nutrients that are needed to help build and maintain the structure?","type":"reveal","answerText":"Select all — the plasma membrane needs LIPIDS (phospholipids & cholesterol) and PROTEINS (plus some surface carbohydrates).","why":"","check":false},{"code":"NUTN-10","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"Animal fats and dairy foods contain","type":"reveal","answerText":"Animal fats and dairy contain SATURATED FATS (and cholesterol).","why":"","check":false},{"code":"NUTN-11","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"One of the function of lipids is to","type":"reveal","answerText":"Lipids provide/store energy, insulate, cushion organs, build cell membranes, make steroid hormones, and carry fat-soluble vitamins.","why":"","check":false},{"code":"NUTN-12","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"Which of the following is NOT a function of lipids?","type":"reveal","answerText":"Odd-one-out: making antibodies / providing the body's quick immediate energy is NOT a lipid function (those are protein/carbohydrate roles). Lipid roles = energy storage, insulation, membranes, hormones.","why":"","check":false},{"code":"NUTN-13","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"A diet rich in proteins would be one consisting of","type":"reveal","answerText":"A protein-rich diet = meat, fish, eggs, dairy, and legumes/beans.","why":"","check":false},{"code":"NUTN-14","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"Which of the following are incomplete proteins?","type":"reveal","answerText":"Incomplete proteins are PLANT proteins missing one or more essential amino acids (e.g. beans, grains, nuts).","why":"","check":false},{"code":"NUTN-15","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"Keratin and collagen that form parts of the integumentary system are formed from eating","type":"reveal","answerText":"Keratin and collagen are made from eating PROTEIN (amino acids).","why":"","check":false},{"code":"NUTN-16","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"Enzymes are examples of","type":"reveal","answerText":"Enzymes are PROTEINS.","why":"","check":false},{"code":"NUTN-17","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"Amino acids that are not being used to make new proteins are","type":"reveal","answerText":"Amino acids not used to make protein are DEAMINATED in the liver (nitrogen removed → urea) and the remainder used for energy or stored as fat.","why":"","check":false},{"code":"NUTN-18","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"To make proteins, do all the amino acids need to be present in a cell, at the same time, and in sufficient amounts?","type":"reveal","answerText":"Yes — to build a protein, ALL the needed amino acids must be present together, at the same time, in sufficient amounts (all-or-none).","why":"","check":false},{"code":"NUTN-19","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"The substances needed to help the body use necessary nutrients are called","type":"reveal","answerText":"VITAMINS (and minerals) help the body use nutrients — they act as coenzymes/cofactors.","why":"","check":false},{"code":"NUTN-20","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"Most vitamins are eaten or ingested. The vitamin that is made by the skin is","type":"reveal","answerText":"VITAMIN D is the vitamin made by the skin (using UV light).","why":"","check":false},{"code":"NUTN-21","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"Vitamin K is needed for","type":"reveal","answerText":"Vitamin K is needed for BLOOD CLOTTING (the liver uses it to make clotting factors).","why":"","check":false},{"code":"NUTN-22","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"Select all that apply The mineral calcium is needed in the body to:","type":"reveal","answerText":"Select all — calcium is needed for: strong BONES & TEETH, MUSCLE CONTRACTION, NERVE transmission, and BLOOD CLOTTING.","why":"","check":false},{"code":"NUTN-23","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"Iodine is the mineral needed to","type":"reveal","answerText":"Iodine is needed to make THYROID HORMONES (thyroxine), which control metabolic rate.","why":"","check":false},{"code":"NUTN-24","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"When the energy taken in, and the energy being used or going out of the body are balanced, a person's mass will","type":"reveal","answerText":"If energy in = energy out, body mass stays the SAME (constant).","why":"","check":false},{"code":"NUTN-25","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"Increases in body temperature","type":"reveal","answerText":"Increases in body temperature RAISE the metabolic rate (reactions speed up) — so more energy is used.","why":"","check":false},{"code":"NUTN-26","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Nutrition","stem":"True or false? One way our body regulates food intake is by transmitting messages, via nerves, from the stretch receptors in the stomach and telling the brain how much has been eaten.","type":"reveal","answerText":"TRUE — stretch receptors in the stomach signal the brain via nerves about how much has been eaten (helping regulate intake).","why":"","check":false},{"code":"DIGB-1","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Basic Digestive System Structure & Function","stem":"Name the three parts of the small intestine in order from the stomach.","type":"reveal","answerText":"DUODENUM, then JEJUNUM, then ILEUM. The duodenum receives chyme plus bile and pancreatic juice; most absorption happens in the jejunum and ileum.","why":"'Dow Jones Industrial' — Duodenum, Jejunum, Ileum.","check":false},{"code":"DIGB-2","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Basic Digestive System Structure & Function","stem":"Which organ makes bile, and where is bile stored and concentrated before use?","type":"reveal","answerText":"The LIVER makes bile continuously; it is stored and concentrated in the GALL BLADDER, which releases it into the duodenum (via the bile duct) to emulsify fats.","why":"Liver makes it, gall bladder stores it.","check":false},{"code":"DIGB-3","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Basic Digestive System Structure & Function","stem":"Trace the upper digestive tract in order from the mouth to the stomach.","type":"reveal","answerText":"Mouth, then pharynx, then oesophagus, then stomach. Swallowed food is pushed down by PERISTALSIS (waves of muscle contraction); the oesophagus itself has no digestive enzymes.","why":"Peristalsis moves food along the whole GI tract.","check":false},{"code":"DIGB-4","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Basic Digestive System Structure & Function","stem":"Name the parts of the large intestine in order.","type":"reveal","answerText":"Caecum (with the appendix), then ascending colon, transverse colon, descending colon, sigmoid colon, rectum, and anus. Its main job is to reabsorb water and form faeces.","why":"Colon goes up, across, down, then S-bend to the rectum.","check":false},{"code":"DIGB-5","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Basic Digestive System Structure & Function","stem":"What are the main functions of the large intestine?","type":"reveal","answerText":"Reabsorb WATER and electrolytes, house gut bacteria (which make some vitamin K and B vitamins), and compact, store and eliminate faeces. Very little chemical digestion happens here.","why":"Main theme: water reclaim + waste storage.","check":false},{"code":"DIGB-6","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Basic Digestive System Structure & Function","stem":"What are the digestive functions of the stomach?","type":"reveal","answerText":"It stores food, churns it (mechanical digestion), and secretes gastric juice — HCl (kills microbes and activates enzymes) plus pepsin, which begins PROTEIN digestion. It turns food into chyme and releases it slowly into the duodenum.","why":"Stomach = protein start + acid + storage; it does NOT absorb much.","check":false},{"code":"DIGB-7","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Basic Digestive System Structure & Function","stem":"Where is the duodenum, and why is it important?","type":"reveal","answerText":"The DUODENUM is the first part of the small intestine, just past the stomach's pyloric sphincter. It receives BILE (from the liver/gall bladder) and PANCREATIC juice, which neutralise stomach acid and digest all three food groups.","why":"The duodenum is where most chemical digestion is completed.","check":false},{"code":"DIGB-8","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Basic Digestive System Structure & Function","stem":"Where does the gall bladder sit, and what does it do?","type":"reveal","answerText":"It sits tucked under the LIVER in the upper-right abdomen. It stores and concentrates BILE, then releases it into the duodenum to emulsify fats — breaking large fat globules into small droplets so lipase can work.","why":"Emulsify = increase fat surface area for digestion.","check":false},{"code":"DIGB-9","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Basic Digestive System Structure & Function","stem":"Where is the rectum, and what is its role?","type":"reveal","answerText":"The RECTUM is the final straight section of the large intestine, just before the anus. It stores faeces; stretching of its wall triggers the urge to defecate.","why":"Rectum = storage; anus = exit.","check":false},{"code":"DIGB-10","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Basic Digestive System Structure & Function","stem":"What guards the anus, and what is the difference between its two sphincters?","type":"reveal","answerText":"The ANUS is the exit of the GI tract, guarded by two sphincters: the INTERNAL anal sphincter (smooth muscle, involuntary) and the EXTERNAL anal sphincter (skeletal muscle, under VOLUNTARY control).","why":"Voluntary external sphincter = why toilet training is possible.","check":false},{"code":"DIGB-11","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Basic Digestive System Structure & Function","stem":"Match each part of the digestive system to its main function: mouth, stomach, small intestine, large intestine, liver, pancreas, gall bladder.","type":"reveal","answerText":"Mouth = ingestion, chewing and starch digestion (salivary amylase). Stomach = protein digestion and storage. Small intestine = digestion completed and nutrients absorbed. Large intestine = water reabsorption. Liver = makes bile. Pancreas = makes digestive enzymes (and bicarbonate). Gall bladder = stores bile.","why":"Liver/pancreas/gall bladder are 'accessory' organs — food never passes through them.","check":false},{"code":"DIGB-12","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Basic Digestive System Structure & Function","stem":"1. Give the letter (A to K) of ONE place (besides the mouth) in the digestive system where mechanical digestion takes place. 2. Give the letter (A to K) of THREE places in the digestive system (besides the mouth) where chemical digestion takes place.","type":"reveal","answerText":"Mechanical digestion (besides the mouth): the STOMACH (churning). Three places of chemical digestion (besides the mouth): the STOMACH, the DUODENUM/small intestine — with enzymes from the pancreas and intestinal wall.","why":"","check":false},{"code":"DIGB-13","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Basic Digestive System Structure & Function","stem":"In a villus of the small intestine, what is absorbed into the central lacteal versus into the blood capillaries?","type":"reveal","answerText":"The central LACTEAL (a lymph vessel) absorbs digested FATS (fatty acids). The blood CAPILLARIES absorb GLUCOSE and AMINO ACIDS.","why":"Fats go to lymph first; sugars and amino acids go straight to blood.","check":false},{"code":"DIGF-1","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestive System Structure & Function","stem":"Name the structures of the small-intestine wall that increase its surface area for absorption.","type":"reveal","answerText":"CIRCULAR FOLDS (plicae) of the wall, covered in VILLI (finger-like projections), each cell topped with MICROVILLI (the brush border). Every villus contains a LACTEAL (absorbs fat) and blood CAPILLARIES (absorb sugars and amino acids).","why":"Folds x villi x microvilli multiply the surface area enormously.","check":false},{"code":"DIGF-2","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestive System Structure & Function","stem":"What are the functions of the villi, microvilli and the lacteal in the small intestine?","type":"reveal","answerText":"Villi and microvilli hugely increase the SURFACE AREA for faster absorption. The villus's blood capillaries absorb glucose and amino acids into the blood; the central LACTEAL absorbs digested fats (fatty acids) into the lymph.","why":"More surface area = more nutrients absorbed per minute.","check":false},{"code":"DIGF-3","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestive System Structure & Function","stem":"Match each digestive enzyme to what it digests: salivary amylase, pepsin, pancreatic amylase, trypsin, pancreatic lipase, and maltase/sucrase/lactase.","type":"reveal","answerText":"Salivary amylase -> starch. Pepsin -> protein (in the stomach). Pancreatic amylase -> starch. Trypsin (and chymotrypsin) -> protein. Pancreatic lipase -> fats. Maltase/sucrase/lactase -> disaccharides into simple sugars.","why":"'-ase' enzymes are named after what they break: amyl(starch), lip(fat), prote(protein).","check":false},{"code":"DIGF-4","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestive System Structure & Function","stem":"Cholecystokinin (CCK): where is it released, what triggers it, and what does it do?","type":"reveal","answerText":"CCK is released by the DUODENUM when fatty or protein-rich chyme arrives. It makes the GALL BLADDER release bile and the PANCREAS release digestive enzymes, and it slows stomach emptying so digestion can keep up.","why":"CCK = 'chole-cysto-kinin' literally means 'move the gall bladder'.","check":false},{"code":"DIGF-5","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestive System Structure & Function","stem":"How can you tell a histology slide is NOT small intestine — what small-intestine features would be missing?","type":"reveal","answerText":"The small intestine has tall VILLI, a MICROVILLI brush border, deep crypts and a central LACTEAL. If those are absent it isn't small intestine — e.g. the stomach has gastric pits and no villi; the large intestine has a flat lining with many goblet cells and no villi.","why":"No villi = not small intestine.","check":false},{"code":"DIGF-6","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestive System Structure & Function","stem":"How do you identify which part of the gut a cross-section is from? Give the tell-tale feature for stomach, small intestine and large intestine.","type":"reveal","answerText":"STOMACH = gastric pits/glands, no villi. SMALL INTESTINE = long villi with a microvilli brush border. LARGE INTESTINE = no villi; a flat lining packed with GOBLET cells (mucus) and straight crypts.","why":"Villi present = small intestine; goblet-rich and flat = large intestine.","check":false},{"code":"DIGF-7","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestive System Structure & Function","stem":"What are the finger-like projections of the small-intestine lining called, and what is their purpose?","type":"reveal","answerText":"They are VILLI (each covered in even tinier MICROVILLI, the brush border). They massively increase the surface area to speed up absorption of digested nutrients.","why":"Villi (visible fingers) vs microvilli (microscopic brush on each cell).","check":false},{"code":"DIGF-8","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestive System Structure & Function","stem":"What visible features let you identify a slide as small intestine?","type":"reveal","answerText":"The presence of VILLI (finger-like projections) topped by a MICROVILLI brush border, each villus containing a central lacteal and capillaries — a pattern unique to the small intestine.","why":"Villi + brush border together = small intestine.","check":false},{"code":"DIGF-9","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestive System Structure & Function","stem":"Trypsin and pepsin are protein-digesting enzymes. They are released in their inactive forms to prevent them from digesting the pancreas and stomach wall respectively.","type":"reveal","answerText":"TRUE — trypsin and pepsin are secreted as INACTIVE zymogens (trypsinogen, pepsinogen) so they don't digest the pancreas/stomach wall; they're activated only in the gut lumen.","why":"","check":false},{"code":"DIGSAQ-1","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion - SAQs","stem":"Describe the composition of pancreatic juice. Where in the pancreas in this juice produced and how does it reach the duodenum? Write your answer below. You'll be able to check all your answers at the end of the quiz.","type":"reveal","answerText":"Pancreatic juice = digestive enzymes (amylase, lipase, trypsinogen/proteases) + bicarbonate (alkaline) + water. The enzymes are made by the ACINAR (acini) cells; the bicarbonate by the duct cells. It travels down the PANCREATIC DUCT, joining the bile duct at the ampulla of Vater, and empties into the DUODENUM.","why":"","check":false},{"code":"DIGSAQ-2","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion - SAQs","stem":"Describe the functions of three enzymes in the pancreatic juice","type":"reveal","answerText":"Three pancreatic enzymes: (1) Pancreatic AMYLASE → breaks starch into maltose; (2) Pancreatic LIPASE → breaks triglycerides into fatty acids + glycerol; (3) TRYPSIN (from trypsinogen) → breaks proteins/polypeptides into smaller peptides.","why":"","check":false},{"code":"DIGSAQ-3","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion - SAQs","stem":"Describe the composition of gastric juice (name the 4 components). Explain the function of each component","type":"reveal","answerText":"Gastric juice — 4 components: (1) HYDROCHLORIC ACID (HCl) — kills microbes, denatures protein, activates pepsin; (2) PEPSINOGEN → PEPSIN — digests protein; (3) MUCUS — protects the stomach lining from acid; (4) INTRINSIC FACTOR — needed to absorb vitamin B12.","why":"","check":false},{"code":"DIGSAQ-4","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion - SAQs","stem":"Describe the structural and functional differences between the mucosa of the stomach and that of the small intestine.","type":"reveal","answerText":"Stomach mucosa: gastric pits/glands with PARIETAL cells (HCl, intrinsic factor) and CHIEF cells (pepsinogen); thick protective mucus; folds (rugae). Small-intestine mucosa: VILLI + MICROVILLI (huge absorptive surface), lacteals & capillaries, crypts of Lieberkühn, goblet cells — adapted for ABSORPTION, not acid secretion.","why":"","check":false},{"code":"DIGMS-1","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"Ingestion is","type":"reveal","answerText":"Ingestion = taking food into the body (through the mouth).","why":"","check":false},{"code":"DIGMS-2","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"Sublingual, Submandibular and Parotid are types of","type":"reveal","answerText":"Sublingual, submandibular and parotid are the three pairs of SALIVARY GLANDS.","why":"","check":false},{"code":"DIGMS-3","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"Which of the following is a digestive function of saliva","type":"reveal","answerText":"Salivary AMYLASE begins starch (carbohydrate) digestion. (Saliva also moistens food and forms a bolus.)","why":"","check":false},{"code":"DIGMS-4","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"The pharynx is the","type":"reveal","answerText":"The pharynx is the THROAT — the shared passage for food and air behind the mouth and nose.","why":"","check":false},{"code":"DIGMS-5","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"The term for chewing is","type":"reveal","answerText":"Chewing = MASTICATION.","why":"","check":false},{"code":"DIGMS-6","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"The teeth, tongue and saliva work to roll the food in the mouth up into a ball for swallowing. This ball is called a","type":"reveal","answerText":"The ball of food formed for swallowing is a BOLUS.","why":"","check":false},{"code":"DIGMS-7","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"The term that refers to the waves of muscular contraction that moves the food through the digestive system is","type":"reveal","answerText":"The waves of muscular contraction that move food along the gut are PERISTALSIS.","why":"","check":false},{"code":"DIGMS-8","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"The serous membranes of the stomach","type":"reveal","answerText":"The serous membrane covering the stomach is the (visceral) PERITONEUM / serosa.","why":"","check":false},{"code":"DIGMS-9","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"The ridges in the stomach are called","type":"reveal","answerText":"The ridges/folds in the stomach are called RUGAE.","why":"","check":false},{"code":"DIGMS-10","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"The gastric juice produced by the stomach of an infant contains","type":"reveal","answerText":"An infant's gastric juice contains RENNIN (chymosin) and gastric lipase to curdle/digest milk, plus HCl and pepsin.","why":"","check":false},{"code":"DIGMS-11","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"Most enzymes require a neutral pH and work best at 37 degrees Celsius. However, the enzyme in the stomach requires a low pH. This is because","type":"reveal","answerText":"The stomach enzyme (pepsin) needs a LOW pH because acid (HCl) activates pepsinogen → pepsin and gives pepsin its optimal acidic working conditions.","why":"","check":false},{"code":"DIGMS-12","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"After the stomach churns, and the gastric juices are mixed up with the bolus, the food breaks down even more and is turned into a liquified food mass called","type":"reveal","answerText":"After churning with gastric juices, the liquefied food is called CHYME.","why":"","check":false},{"code":"DIGMS-13","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"The mechanical and chemical changing of food composition is called","type":"reveal","answerText":"The mechanical + chemical breakdown of food is DIGESTION.","why":"","check":false},{"code":"DIGMS-14","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"Two muscular rings control movement of food into and out of the stomach. They are called the","type":"reveal","answerText":"The two muscular rings (SPHINCTERS) are the CARDIAC (lower oesophageal) sphincter and the PYLORIC sphincter.","why":"","check":false},{"code":"DIGMS-15","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"The lower part of the stomach that is shaped a bit like a 'J' is called the","type":"reveal","answerText":"The lower, J-shaped part of the stomach is the PYLORUS (pyloric region).","why":"","check":false},{"code":"DIGMS-16","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"The oesophagus is","type":"reveal","answerText":"The oesophagus is the muscular tube that carries food from the pharynx to the stomach (by peristalsis).","why":"","check":false},{"code":"DIGMS-17","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"Choose the answer that lists the four layers of the wall of the alimentary canal in order from innermost to outermost","type":"reveal","answerText":"Four layers of the alimentary canal, innermost → outermost: MUCOSA → SUBMUCOSA → MUSCULARIS (externa) → SEROSA.","why":"","check":false},{"code":"DIGMS-18","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"Chemical digestion starts in the","type":"reveal","answerText":"Chemical digestion starts in the MOUTH (salivary amylase on starch).","why":"","check":false},{"code":"DIGMS-19","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"Sometimes the sphincter muscles weaken. What is a possible effect of a weakened cardiac sphincter?","type":"reveal","answerText":"A weakened cardiac (lower oesophageal) sphincter → ACID REFLUX / heartburn (GORD) — stomach acid flows back into the oesophagus.","why":"","check":false},{"code":"DIGMS-20","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"The stomach can expand to over 100 times its empty volume. This is due partly to the","type":"reveal","answerText":"The stomach expands greatly thanks to its RUGAE (folds) flattening out as it fills.","why":"","check":false},{"code":"DIGMS-21","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"Sione suffers from acid reflux and consumes many antacid tablets (like Quick Eze or Mylanta). He finds that he is unable to digest which of the following nutrients very well.","type":"reveal","answerText":"With antacids reducing stomach acid, PROTEIN is digested poorly (pepsin needs acid to work).","why":"","check":false},{"code":"DIGMS-22","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"Which cells are responsible for producing HCl","type":"reveal","answerText":"HCl is produced by the PARIETAL (oxyntic) cells of the stomach.","why":"","check":false},{"code":"DIGMS-23","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"Which of the following types of epithelial cells are mostly predominant throughout the digestive tract?","type":"reveal","answerText":"The digestive tract is lined mostly by SIMPLE COLUMNAR epithelium.","why":"","check":false},{"code":"DIGMS-24","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"In addition to storage and mechanical digestion of food, the stomach:","type":"reveal","answerText":"Besides storage/mechanical digestion, the stomach chemically digests PROTEIN (pepsin), secretes intrinsic factor, and kills microbes with acid.","why":"","check":false},{"code":"DIGMS-25","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"Which nutrient groups must be chemically digested, and which don't need digesting?","type":"reveal","answerText":"The nutrients that must be digested are the large macromolecules: CARBOHYDRATES, PROTEINS and FATS. (Vitamins, minerals and water don't need digesting.)","why":"","check":false},{"code":"DIGMS-26","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (mouth to stomach)","stem":"When peristalsis happens in reverse you will","type":"reveal","answerText":"Peristalsis in reverse = VOMITING (emesis).","why":"","check":false},{"code":"DIGDA-1","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"Which of the following is NOT an accessory digestive organ?","type":"reveal","answerText":"Accessory organs = salivary glands, teeth, tongue, liver, gall bladder, pancreas. The odd-one-out (part of the tract itself, e.g. the stomach or small intestine) is NOT an accessory organ.","why":"","check":false},{"code":"DIGDA-2","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"All nutrients are absorbed through the villi and are taken to the liver for metabolic processing, or storage. The name of the blood vessel that collects and takes these nutrients to the liver is the","type":"reveal","answerText":"The HEPATIC PORTAL VEIN carries absorbed nutrients from the gut to the liver.","why":"","check":false},{"code":"DIGDA-3","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"The beginning of the small intestine is called the","type":"reveal","answerText":"The small intestine begins at the DUODENUM.","why":"","check":false},{"code":"DIGDA-4","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"When the semi digested food enters the duodenum, have the fats or lipids been digested?","type":"reveal","answerText":"No — fats are barely digested before the DUODENUM, where bile emulsifies them and pancreatic lipase digests them.","why":"","check":false},{"code":"DIGDA-5","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"One of the functions of the small intestine is to completely finish of the chemical digestion of macromolecules to the building blocks. The other function of the small intestine is to","type":"reveal","answerText":"The other main function of the small intestine is ABSORPTION of nutrients into blood/lymph.","why":"","check":false},{"code":"DIGDA-6","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"The liver is made of lobules. Each lobule is made up of liver cells. These are called","type":"reveal","answerText":"Liver cells are called HEPATOCYTES.","why":"","check":false},{"code":"DIGDA-7","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"Which of the following is NOT a function of the liver","type":"reveal","answerText":"Odd-one-out: the liver does NOT produce insulin (that's the pancreas) or mechanically digest food. Its jobs include bile, detox, storage, metabolism and making plasma proteins.","why":"","check":false},{"code":"DIGDA-8","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"As red blood cells (RBCs) do not have nuclei, they are unable to make new proteins and thus are unable to repair themselves when they get old and inflexible. The old, worn-out RBCs go to the liver where they are broken down. The haem protein in the RBC is used to form","type":"reveal","answerText":"The haem from old RBCs is turned into BILIRUBIN (a bile pigment); the iron is recycled.","why":"","check":false},{"code":"DIGDA-9","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"Which of the following is NOT a function of bile?","type":"reveal","answerText":"Odd-one-out: bile contains NO digestive enzymes. Bile emulsifies fats, aids fat & fat-soluble-vitamin absorption, and excretes bilirubin/cholesterol.","why":"","check":false},{"code":"DIGDA-10","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"Which of the following TWO statements are true, in regard to bile.","type":"reveal","answerText":"Two true statements: bile is MADE by the liver and STORED/concentrated in the gall bladder; it EMULSIFIES fats (breaks them into droplets) but has no enzymes.","why":"","check":false},{"code":"DIGDA-11","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"Pancreatic juice","type":"reveal","answerText":"Pancreatic juice is an alkaline fluid (bicarbonate) + enzymes (amylase, lipase, proteases); it neutralises acidic chyme and digests all food types in the duodenum.","why":"","check":false},{"code":"DIGDA-12","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"The structure divided into the caecum, appendix, colon, rectum, anus is the","type":"reveal","answerText":"The structure divided into caecum, appendix, colon, rectum and anus is the LARGE INTESTINE.","why":"","check":false},{"code":"DIGDA-13","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"Pancreatic amylase, lipase and trypsin are released and then activated in the duodenum. They are collectively referred to as","type":"reveal","answerText":"Pancreatic amylase, lipase and trypsin are collectively PANCREATIC JUICE (pancreatic enzymes).","why":"","check":false},{"code":"DIGDA-14","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"The large intestine contains normal flora (bacteria that reside normally on or within the body). One of the functions of these bacteria is to","type":"reveal","answerText":"Large-intestine normal flora make VITAMIN K (and some B vitamins) and ferment undigested fibre.","why":"","check":false},{"code":"DIGDA-15","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"The main function of the colon is to","type":"reveal","answerText":"The main function of the colon is to REABSORB WATER and electrolytes (forming and storing faeces).","why":"","check":false},{"code":"DIGDA-16","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"The enzyme trypsin","type":"reveal","answerText":"Trypsin is a pancreatic PROTEASE that digests proteins/polypeptides into smaller peptides (secreted inactive as trypsinogen).","why":"","check":false},{"code":"DIGDA-17","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"Segmentation contractions of the small intestine mix which of the following substances?","type":"reveal","answerText":"Segmentation contractions mix CHYME with digestive juices (bile, pancreatic and intestinal secretions) in the small intestine.","why":"","check":false},{"code":"DIGDA-18","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"Undigested food is moved along the colon by two processes. These are","type":"reveal","answerText":"Undigested food is moved along the colon by PERISTALSIS and (mass) HAUSTRAL contractions.","why":"","check":false},{"code":"DIGDA-19","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"There are two sorts of nerves. Parasympathetic nerves work when you are resting. Sympathetic nerves are working when you are active, or when you are scared or frightened. These are the nerves that spur you into action when you are scared! When you want to empty the rectum in order to defecate, which nerves do you think would be functioning more?","type":"reveal","answerText":"PARASYMPATHETIC nerves (rest-and-digest) are more active during defecation.","why":"","check":false},{"code":"DIGDA-20","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"The majority of nutrient absorption occurs in the","type":"reveal","answerText":"Most nutrient absorption occurs in the SMALL INTESTINE (via its villi).","why":"","check":false},{"code":"DIGDA-21","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"When your tummy growls in response to an ad on TV, or the smell of food, which part of the gastric secretion is occurring","type":"reveal","answerText":"A tummy growl triggered by an ad/smell = the CEPHALIC phase of gastric secretion (sight/smell/thought of food).","why":"","check":false},{"code":"DIGDA-22","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"The small intestine is well adapted to absorb nutrients. It has become specialised for this job with the presence of","type":"reveal","answerText":"The small intestine is specialised with VILLI and MICROVILLI (and circular folds) — hugely increasing absorptive surface area.","why":"","check":false},{"code":"DIGDA-23","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"In terms of digestion, the colons greatest contribution would be","type":"reveal","answerText":"The colon's greatest contribution is WATER/electrolyte REABSORPTION (and forming faeces).","why":"","check":false},{"code":"DIGDA-24","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"Fatty acids known as triglycerides, are absorbed into the","type":"reveal","answerText":"Fatty acids (as triglycerides) are absorbed into the LACTEALS (lymphatic vessels) of the villi.","why":"","check":false},{"code":"DIGDA-25","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"The small intestine is so called because","type":"reveal","answerText":"The small intestine is 'small' because of its narrow DIAMETER (it's actually very long).","why":"","check":false},{"code":"DIGDA-26","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"When the small intestine secretes the hormones CCK and secretin, the hormones go into the blood and cause","type":"reveal","answerText":"CCK and secretin make the GALL BLADDER release bile and the PANCREAS release enzymes/bicarbonate (and slow stomach emptying).","why":"","check":false},{"code":"DIGDA-27","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"The liver is least likely to be involved with","type":"reveal","answerText":"Odd-one-out: the liver is least likely to be involved in directly absorbing nutrients across villi, or making insulin — those aren't liver jobs.","why":"","check":false},{"code":"DIGDA-28","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Digestion (duodenum to anus)","stem":"Microscopically, the liver is made up of rows of cuboidal cells with small blood spaces running between the cells called","type":"reveal","answerText":"The small blood spaces running between rows of liver cells are the SINUSOIDS.","why":"","check":false},{"code":"CARB-1","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Carbohydrate Metabolism","stem":"The primary purpose of carbohydrate metabolism in the human body is to:","type":"reveal","answerText":"The main purpose of carbohydrate metabolism is to provide ENERGY (ATP) — mainly glucose for cells.","why":"","check":false},{"code":"CARB-2","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Carbohydrate Metabolism","stem":"The main carbohydrate found in the diet that is broken down during digestion is:","type":"reveal","answerText":"The main dietary carbohydrate broken down in digestion is STARCH.","why":"","check":false},{"code":"CARB-3","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Carbohydrate Metabolism","stem":"During digestion, carbohydrates are mainly broken down into:","type":"reveal","answerText":"Carbohydrates are mainly broken down into GLUCOSE (monosaccharides).","why":"","check":false},{"code":"CARB-4","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Carbohydrate Metabolism","stem":"Excess glucose that is not immediately required for energy is stored in the liver and muscles as:","type":"reveal","answerText":"Excess glucose is stored as GLYCOGEN (in the liver and muscles).","why":"","check":false},{"code":"CARB-5","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Carbohydrate Metabolism","stem":"When blood glucose levels fall between meals, which hormone helps raise blood glucose levels?","type":"reveal","answerText":"GLUCAGON raises blood glucose between meals (releases glucose from glycogen).","why":"","check":false},{"code":"CARB-6","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Carbohydrate Metabolism","stem":"Which statement best describes glycolysis?","type":"reveal","answerText":"Glycolysis = breaking glucose down (into pyruvate) in the cytoplasm, releasing some ATP — the first stage of cellular respiration.","why":"","check":false},{"code":"CARB-7","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Carbohydrate Metabolism","stem":"Why is understanding carbohydrate metabolism important in nursing practice?","type":"reveal","answerText":"It matters in nursing to safely manage blood glucose (diabetes: hypo-/hyperglycaemia), nutrition and energy needs.","why":"","check":false},{"code":"CARB-8","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Carbohydrate Metabolism","stem":"Carbohydrate metabolism takes place primarily in which parts of the body?","type":"reveal","answerText":"Carbohydrate metabolism happens mainly in the LIVER and MUSCLE cells (glucose is used by all cells; the liver regulates blood glucose).","why":"","check":false},{"code":"CARB-9","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Carbohydrate Metabolism","stem":"The enzyme amylase plays a key role in carbohydrate metabolism by:","type":"reveal","answerText":"Amylase breaks down STARCH into maltose/sugars (begins carbohydrate digestion).","why":"","check":false},{"code":"CARB-10","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Carbohydrate Metabolism","stem":"When blood glucose levels are high, insulin promotes:","type":"reveal","answerText":"When glucose is high, insulin promotes glucose UPTAKE into cells and storage as GLYCOGEN (glycogenesis) — lowering blood glucose.","why":"","check":false},{"code":"CARB-11","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Carbohydrate Metabolism","stem":"What happens to glucose once it enters a body cell?","type":"reveal","answerText":"Once in a cell, glucose is broken down (glycolysis + respiration) to make ATP, or stored as glycogen/fat.","why":"","check":false},{"code":"CARB-12","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Carbohydrate Metabolism","stem":"Which carbohydrate storage form is found primarily in the liver and skeletal muscles?","type":"reveal","answerText":"The carbohydrate storage form in the liver and skeletal muscle is GLYCOGEN.","why":"","check":false},{"code":"PROT-1","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Protein Metabolism","stem":"The main function of protein metabolism in the human body is to:","type":"reveal","answerText":"Protein metabolism builds and repairs tissues and makes proteins (enzymes, hormones, antibodies); amino acids can also be used for energy.","why":"","check":false},{"code":"PROT-2","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Protein Metabolism","stem":"During digestion, dietary proteins are broken down into:","type":"reveal","answerText":"Dietary proteins are broken down into AMINO ACIDS.","why":"","check":false},{"code":"PROT-3","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Protein Metabolism","stem":"Protein digestion begins primarily in the:","type":"reveal","answerText":"Protein digestion begins primarily in the STOMACH.","why":"","check":false},{"code":"PROT-4","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Protein Metabolism","stem":"Which enzyme plays a major role in starting protein digestion in the stomach?","type":"reveal","answerText":"PEPSIN starts protein digestion in the stomach.","why":"","check":false},{"code":"PROT-5","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Protein Metabolism","stem":"After digestion, amino acids are absorbed mainly in the:","type":"reveal","answerText":"Amino acids are absorbed mainly in the SMALL INTESTINE.","why":"","check":false},{"code":"PROT-6","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Protein Metabolism","stem":"Once absorbed, amino acids are used by the body to:","type":"reveal","answerText":"Amino acids are used to build new proteins (growth/repair), enzymes, hormones and antibodies — or deaminated for energy.","why":"","check":false},{"code":"PROT-7","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Protein Metabolism","stem":"Excess amino acids that are not needed for protein synthesis are:","type":"reveal","answerText":"Excess amino acids are DEAMINATED in the liver (nitrogen → urea) and used for energy or stored as fat (they can't be stored as protein).","why":"","check":false},{"code":"PROT-8","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Protein Metabolism","stem":"The process of removing the nitrogen group from amino acids during metabolism is called:","type":"reveal","answerText":"Removing the nitrogen group from an amino acid is DEAMINATION.","why":"","check":false},{"code":"PROT-9","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Protein Metabolism","stem":"The liver plays an important role in protein metabolism by:","type":"reveal","answerText":"The liver does deamination, makes UREA, and makes plasma proteins (albumin, clotting factors); also transamination.","why":"","check":false},{"code":"PROT-10","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Protein Metabolism","stem":"When protein intake is inadequate, the body is most likely to:","type":"reveal","answerText":"With inadequate protein intake, the body breaks down its own (muscle) protein for amino acids → muscle wasting; low plasma protein can cause oedema.","why":"","check":false},{"code":"LIPID-1","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Lipid Metabolism","stem":"The primary role of lipid metabolism in the human body is to:","type":"reveal","answerText":"Lipid metabolism mainly STORES and PROVIDES energy (fat = the body's main long-term energy store); lipids also build membranes and hormones.","why":"","check":false},{"code":"LIPID-2","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Lipid Metabolism","stem":"Dietary lipids are mainly digested in the:","type":"reveal","answerText":"Dietary lipids are mainly digested in the SMALL INTESTINE (duodenum) using bile + pancreatic lipase.","why":"","check":false},{"code":"LIPID-3","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Lipid Metabolism","stem":"Which substance is released by the liver to help break down fats into smaller droplets?","type":"reveal","answerText":"BILE (from the liver) emulsifies fat into small droplets.","why":"","check":false},{"code":"LIPID-4","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Lipid Metabolism","stem":"The main enzyme responsible for breaking down triglycerides into fatty acids is:","type":"reveal","answerText":"LIPASE (pancreatic lipase) breaks triglycerides into fatty acids.","why":"","check":false},{"code":"LIPID-5","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Lipid Metabolism","stem":"During digestion, lipids are broken down into:","type":"reveal","answerText":"Lipids are broken down into FATTY ACIDS and GLYCEROL.","why":"","check":false},{"code":"LIPID-6","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Lipid Metabolism","stem":"After absorption, most lipids are transported in the body:","type":"reveal","answerText":"After absorption, lipids travel in the LYMPH (as chylomicrons via the lacteals), then into the blood, carried by lipoproteins.","why":"","check":false},{"code":"LIPID-7","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Lipid Metabolism","stem":"Excess lipids that are not immediately required for energy are mainly stored in:","type":"reveal","answerText":"Excess lipids are stored in ADIPOSE TISSUE (as triglycerides).","why":"","check":false},{"code":"LIPID-8","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Lipid Metabolism","stem":"When carbohydrate intake is low, lipids can be broken down to provide:","type":"reveal","answerText":"When carbohydrate is low, lipids are broken down for ENERGY (fatty acids → acetyl-CoA → ATP), and can form ketones.","why":"","check":false},{"code":"LIPID-9","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Lipid Metabolism","stem":"Which hormone promotes the storage of fat after a meal?","type":"reveal","answerText":"INSULIN promotes fat storage after a meal.","why":"","check":false},{"code":"LIPID-10","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"Lipid Metabolism","stem":"During prolonged fasting or starvation, increased fat metabolism can lead to the production of:","type":"reveal","answerText":"Prolonged fasting/starvation increases fat metabolism, producing KETONES (ketone bodies) — can cause ketosis/ketoacidosis.","why":"","check":false},{"code":"METAB-1","module":3,"moduleName":"Module 3 · Nutrition, Digestion & Metabolism","quiz":"More Metabolism Questions","stem":"A synthesis reaction is best described as:","type":"reveal","answerText":"A

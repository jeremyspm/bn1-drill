ymptoms","a syndrome","signs","qualitiative"],"answer":2,"why":"Signs are measurable/observable (BP, rash); symptoms are what the patient reports (pain, nausea).","check":false},{"code":"MIC2-61","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"People used to think the meat magically turned into maggots. This is an example of","type":"mcq","options":["biogenesis","spontaneous generation","asexual reproduction","binary fission"],"answer":1,"why":"Believing meat turns into maggots = spontaneous generation (disproved theory).","check":false},{"code":"MIC2-62","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"The complete destruction or removal of all microbes including viruses and endospores is called","type":"mcq","options":["sterilisation","aseptic technique","sanitation","disinfection"],"answer":0,"why":"Sterilisation = complete destruction of ALL microbes, including viruses and endospores.","check":false},{"code":"MIC2-63","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Daphne has a throat infection and takes a course of penicillin. Unfortunately, the penicillin kills off the natural flora of the body, and she soon finds herself \"riddled\" with a vaginal thrush infection, caused by an overgrowth of Candida. This is an example of:","type":"mcq","options":["a superinfection","a primary infection","an opportunistic infection","a secondary infection"],"answer":0,"why":"Antibiotics wiping out normal flora → Candida overgrowth = a superinfection.","check":false},{"code":"MIC2-64","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"A substance produced by microbes that interferes with the normal functioning of host cells or tissues are called","type":"mcq","options":["extracellular digestion","pyrogens","virions","toxins"],"answer":3,"why":"Toxins are microbial substances that damage host cells/tissues.","check":false},{"code":"MIC2-65","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Microbes found on the body for only a small amount of time, that do not cause disease are","type":"mcq","options":["transients","residents","opportunistic","natural flora"],"answer":0,"why":"Transients are microbes present only briefly and don't cause disease.","check":false},{"code":"MIC2-66","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Warts are caused by","type":"mcq","options":["benign cancers","bacteria","fungi","viruses"],"answer":3,"why":"Warts are caused by viruses (HPV).","check":false},{"code":"MIC2-67","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"The zone of inhibition refers to the","type":"mcq","options":["the places on the body where there is no natural bacteria","clear area on an agar plate that is free of antibiotics as the bacteria have killed them","clear area on an agar plate that is free of bacteria as antibiotics on the plate have killed them","the areas on an agar plate where bacteria grow"],"answer":2,"why":"Zone of inhibition = the clear ring on an agar plate where antibiotic has killed the bacteria.","check":false},{"code":"MIC2-68","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Bacteria and fungi get their nutrients by","type":"mcq","options":["phagocytosis","binary fission","intracellular digestion","extracellular digestion"],"answer":3,"why":"Bacteria and fungi use extracellular digestion — they secrete enzymes then absorb the products.","check":false},{"code":"MIC2-69","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Some microbes are hard to treat because they are not killed by antibiotics, are too small to detect and can hide inside other cells, can mutate to form different strains, and because they use a human host are often difficult to find a method of annihilation that will not harm the host. The microbe that meets all these criteria is the","type":"mcq","options":["amoeba","fungi","virus","bacteria"],"answer":2,"why":"A virus: not killed by antibiotics, hides inside cells, mutates into strains, hard to target without harming the host.","check":false},{"code":"MIC2-70","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"The microbe characterised by its simple structure of a protein coat and nucleic material is the","type":"mcq","options":["virus","bacteria","mould","paramecium"],"answer":0,"why":"A virus is basically a protein coat (capsid) around nucleic acid — the simplest microbe.","check":false},{"code":"MICTERM-1","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbiology Terminology","stem":"Define these microbiology terms: agar, antibiotic, gel sanitiser, microbe, control, streak plate, sensitivity, resistance, blood agar, colony, normal flora, leucocyte, UTI.","type":"reveal","answerText":"Term ↔ definition matches: Agar = jelly growth medium; Antibiotic = substance that targets/kills bacteria; Gel sanitiser = high-alcohol hand rub; Microbe = tiny organism (fungi, bacteria, viruses); Control = the sample with no variable applied (checks for contamination); Streak plate = method to get isolated colonies; Sensitivity = affected/killed by something; Resistance = able to withstand it; Blood agar = enriched growth medium; Colony = growth from one microbe; Normal flora = resident body microbes; Leucocyte = white blood cell; UTI = urinary tract infection.","why":"","check":false},{"code":"MICTERM-2","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbiology Terminology","stem":"Define these microbiology terms: swab, inoculating loop, inoculate, bacterial culture, bacterial lawn, inhibition, zone, fatal, MSU, pili, pathogen, sterilisation, disinfect, sterile, autoclave.","type":"reveal","answerText":"Term ↔ definition matches: Swab = sterile sampling tool; Inoculating loop = sterile tool to transfer culture to agar; Inoculate = introduce microbes into a medium; Bacterial culture = growing microbes on medium for ID; Bacterial lawn = confluent growth covering the agar; Inhibition = stopping growth; Zone = an area; Fatal = able to kill; MSU = mid-stream urine sample; Pili = help bacteria stick / pass DNA; Pathogen = a disease-causing microbe; Sterilisation = remove ALL microbes; Disinfect = remove MOST microbes; Sterile = no microbes present; Autoclave = steam steriliser.","why":"","check":false},{"code":"MICREV-1","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbiology Review","stem":"What is an autoclave?","type":"reveal","answerText":"An autoclave sterilises equipment using pressurised steam (~121°C, 15 psi). The high temperature kills ALL microbes, including heat-resistant endospores.","why":"","check":false},{"code":"MICREV-2","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbiology Review","stem":"Define disinfectant","type":"reveal","answerText":"A disinfectant is a chemical that destroys or removes MOST microbes from non-living surfaces/objects (it may not kill all spores).","why":"","check":false},{"code":"MICREV-3","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbiology Review","stem":"How is a disinfectant different to an antiseptic","type":"reveal","answerText":"An antiseptic is used on LIVING tissue/skin; a disinfectant is used on NON-LIVING surfaces. Antiseptics are gentler because they must not damage tissue.","why":"","check":false},{"code":"MICREV-4","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbiology Review","stem":"Water cyclinders are generally set at 55 degree celcius to avoid scalding and burns. Often people run utensils and plates straight under hot water from the tap to clean them. How effective will this be? Why?","type":"reveal","answerText":"Not very effective. At ~55°C the water is well below sterilising temperature and contact time is only a few seconds — this just rinses off visible debris. It does not kill most pathogens or spores. Proper cleaning needs detergent + scrubbing, and true killing needs much higher temperatures (e.g. an autoclave/dishwasher sanitise cycle) or a disinfectant.","why":"","check":false},{"code":"ACID-1","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Acidosis and Alkalosis","stem":"True or false: fat-soluble substances (like fatty acids) can diffuse freely through the phospholipid bilayer of the cell membrane.","type":"mcq","options":["True","False"],"answer":0,"why":"True — fat-soluble substances cross the lipid bilayer freely; large water-soluble ones (e.g. glucose) need channel/carrier proteins.","check":false},{"code":"ACID-2","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Acidosis and Alkalosis","stem":"True or false: in hyperglycaemia (>10 mmol/L), the high blood glucose in a diabetic is because the body's cells cannot take glucose up from the blood.","type":"mcq","options":["True","False"],"answer":0,"why":"True — without effective insulin, glucose stays high in the blood because cells can't take it up.","check":false},{"code":"ACID-3","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Acidosis and Alkalosis","stem":"A blood pH of 7 is seen as acidotic.","type":"mcq","options":["True","False"],"answer":0,"why":"True — normal blood pH is 7.35–7.45, so pH 7 counts as acidotic.","check":false},{"code":"ACID-4","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Acidosis and Alkalosis","stem":"High levels of bicarbonate ions in the blood due to the intake of massive amounts of antacids are known as:","type":"mcq","options":["metabolic acidosis","respiratory alkalosis","metabolic alkalosis","respiratory acidosis"],"answer":2,"why":"Excess bicarbonate (antacids) raises pH = metabolic alkalosis.","check":false},{"code":"ACID-5","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Acidosis and Alkalosis","stem":"Carbon dioxide dissolves in blood plasma forming carbonic acid and lowering the blood pH. High carbon dioxide levels in the blood therefore cause:","type":"mcq","options":["respiratory alkalosis","metabolic alkalosis","metabolic acidosis","respiratory acidosis"],"answer":3,"why":"CO2 + H2O → carbonic acid, lowering pH. High CO2 (a lung/'respiratory' cause) = respiratory acidosis.","check":false},{"code":"ACID-6","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Acidosis and Alkalosis","stem":"The body usually compensates for respiratory acidosis and respiratory alkalosis using the kidneys.","type":"mcq","options":["True","False"],"answer":0,"why":"True — the kidneys (retaining/excreting bicarbonate & H+) compensate for respiratory acid-base problems, and the lungs compensate for metabolic ones.","check":false},{"code":"ACID-7","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Acidosis and Alkalosis","stem":"People feel dizzy when they breathe fast and deep. This breathing pattern causes respiratory acidosis since the blood CO2 becomes too low.","type":"mcq","options":["True","False"],"answer":1,"why":"False — fast, deep breathing (hyperventilation) blows off CO2, so it causes respiratory ALKALOSIS, not acidosis.","check":false},{"code":"ACID-8","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Acidosis and Alkalosis","stem":"For each breathing pattern, give its acid-base effect: Kussmaul (deep, rapid), hyperventilation, and hypoventilation (shallow/slow).","type":"reveal","answerText":"Breathing patterns ↔ pH: Kussmaul (deep, rapid) breathing COMPENSATES for metabolic acidosis (blows off CO2 to counter excess H+). Hyperventilation CAUSES respiratory alkalosis (too little CO2). Hypoventilation (rapid shallow / slow breathing) CAUSES respiratory acidosis (CO2 accumulates).","why":"","check":false},{"code":"ACID-9","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Acidosis and Alkalosis","stem":"Define and link these: hypokalaemia vs hyperkalaemia, and what causes metabolic alkalosis (diuretics, excess antacids, blowing off too much CO2)?","type":"reveal","answerText":"Matches: Hypokalaemia = low blood potassium; Hyperkalaemia = high blood potassium. Some diuretics cause hypokalaemia AND metabolic alkalosis. Excess antacids → metabolic alkalosis. 'Too much CO2 blown off' → respiratory alkalosis. Arrhythmias are linked to both hyper- and hypokalaemia.","why":"","check":false},{"code":"ACID-10","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Acidosis and Alkalosis","stem":"In diabetic ketoacidosis (DKA): what are ketones and where are they made, which hormone problem triggers it, and below what blood pH is it a medical emergency?","type":"reveal","answerText":"Ketones (acetone, ketoacids) are an alternative FUEL made from fatty acids in the LIVER when glucose can't get into cells. In DKA a lack of INSULIN means cells can't use glucose, so fat is broken down and ketoacids build up, dropping blood pH. Below pH 7.35 = acidosis; a big drop is an emergency. Type 1 diabetics are at highest risk.","why":"Fruity-smelling breath is a classic sign of ketones.","check":false},{"code":"ACID-11","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Acidosis and Alkalosis","stem":"True or false: one reason people with serious lung problems (e.g. COVID-19 pneumonia) are put on ventilators is to prevent respiratory acidosis.","type":"mcq","options":["True","False"],"answer":0,"why":"True — ventilation clears CO2, preventing the CO2 build-up that would cause respiratory acidosis.","check":false},{"code":"ACID-12","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Acidosis and Alkalosis","stem":"Narcotics can cause _______ because they can _______","type":"mcq","options":["metabolic alkalosis; stimulate breathing","metabolic acidosis; stimulate breathing","respiratory acidosis; suppress breathing","respiratory alkalosis; suppress breathing"],"answer":2,"why":"Narcotics/opioids suppress the breathing centre → CO2 builds up → respiratory acidosis.","check":false},{"code":"ACID-13","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Acidosis and Alkalosis","stem":"Name three common drugs or substances that can cause metabolic acidosis.","type":"reveal","answerText":"ASPIRIN (salicylate overdose), METHANOL, and METFORMIN (can cause lactic acidosis). Note: antacids cause alkalosis, not acidosis.","why":"Metabolic (not respiratory) = the problem is added acid or lost bicarbonate, not CO2.","check":false},{"code":"BLOOD-1","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"One regulatory function of blood is to","type":"mcq","options":["maintain blood pH","take oxygen to cells","reduce infections","to take urea to the liver"],"answer":0,"why":"Regulation: blood helps maintain pH (also temperature & fluid balance). Carrying O2 is a TRANSPORT function.","check":false},{"code":"BLOOD-2","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"The term thrombocyte refers to","type":"mcq","options":["red blood cells","proteins in the plasma","white blood cells","platelets"],"answer":3,"why":"Thrombocytes = platelets (clotting).","check":false},{"code":"BLOOD-3","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"Blood is a connective tissue. All connective tissues have fibres. The precursor to the formation of fibres that support blood clotting is a protein called","type":"mcq","options":["fibrin","fibrinogen","collagen","fibroblast"],"answer":1,"why":"Fibrinogen (soluble plasma protein) is converted to fibrin threads during clotting.","check":false},{"code":"BLOOD-4","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"What is the primary function of the erythrocyte?","type":"mcq","options":["haemostasis","making antibodies","transporting oxygen","fighting infection"],"answer":2,"why":"The erythrocyte (RBC) transports oxygen via haemoglobin.","check":false},{"code":"BLOOD-5","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"Where are blood cells produced?","type":"mcq","options":["the liver","the kidney","the heart","in bone marrow"],"answer":3,"why":"Blood cells are made in red bone marrow (haematopoiesis).","check":false},{"code":"BLOOD-6","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"Which structure contains dissolved substances that can be useful or waste?","type":"mcq","options":["WBC","thrombocytes","plasma","RBC"],"answer":2,"why":"Plasma is the fluid that carries dissolved nutrients, wastes, gases and proteins.","check":false},{"code":"BLOOD-7","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"How long to RBC last and where are they broken down primarily?","type":"mcq","options":["120 days, spleen","30 days kidney","120 days, kidney","30 days, spleen"],"answer":0,"why":"RBCs live ~120 days and are broken down mainly in the spleen (and liver).","check":false},{"code":"BLOOD-8","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"Tamāra has been infected with tapeworm! If we had a blood test we would see an increase in","type":"mcq","options":["platelets","Eosinophils","Neutrophils","Basophils"],"answer":1,"why":"Eosinophils rise with parasitic/worm infections (e.g. tapeworm).","check":false},{"code":"BLOOD-9","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"Samuel has taken some antihistamines as he is allergic to lupin. What cells would have increased in his body that has resulted in him taking this medication?","type":"mcq","options":["Neutrophils","Basophils","Philrodpot","Phagocytes"],"answer":1,"why":"Basophils (and mast cells) drive allergic reactions by releasing histamine — hence antihistamines.","check":false},{"code":"BLOOD-10","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"The first stage of haemostasis is","type":"mcq","options":["coagulation","vasodilation","vasoconstriction","vasopressin"],"answer":2,"why":"Haemostasis begins with vascular spasm = vasoconstriction, then platelet plug, then coagulation.","check":false},{"code":"BLOOD-11","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"Why are RBC considered 'unselfish\" in regards to their function?","type":"mcq","options":["They lack mitochondria to ensure all oxygen is delivered to other cells.","They can reproduce to share their oxygen transport abilities.","They donate their hemoglobin to white blood cells.","They consume oxygen only for their own energy needs."],"answer":0,"why":"Mature RBCs have no mitochondria, so they don't use the oxygen they carry — it's all delivered to other cells ('unselfish').","check":false},{"code":"BLOOD-12","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"Which of the following blood groups is considered the universal donor?","type":"mcq","options":["O+","O-","AB+","AB-"],"answer":1,"why":"O negative is the universal donor (no A, B or Rh antigens to react against).","check":false},{"code":"BLOOD-13","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"Which blood group seems the most 'selfish\" as it can use any donated blood but can only give to one blood group?","type":"mcq","options":["A-","AB-","AB+","O+"],"answer":2,"why":"AB+ is the universal recipient (can receive any blood) but can donate only to AB+ ('selfish').","check":false},{"code":"BLOOD-14","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"Why do mature RBC not have a nucleus?","type":"mcq","options":["To make them more rigid","To prevent them from dividing","To increase their energy production","To allow for more hemoglobin storage and oxygen transport"],"answer":3,"why":"No nucleus (or organelles) leaves more room for haemoglobin → more oxygen carried.","check":false},{"code":"BLOOD-15","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"What triggers erythropoiesis?","type":"mcq","options":["High levels of oxygen in the blood","Increased white blood cell count","High levels of platelets","Low oxygen levels in tissues"],"answer":3,"why":"Low tissue oxygen triggers the kidney to release erythropoietin → erythropoiesis (more RBCs).","check":false},{"code":"BLOOD-16","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"Albumin is a large protein that floats around in blood plasma. It helps with homeostasis by acting as","type":"mcq","options":["fights of infections by producing antibodies","promotes the production of eosinophils","supports the transport of oxygen","a chemical sponge soaking up H+ or releasing them to maintain acid base balance"],"answer":3,"why":"Albumin (a plasma protein) acts as a buffer — a 'sponge' absorbing/releasing H+ to steady blood pH (it also maintains oncotic pressure).","check":false},{"code":"BLOOD-17","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"Blood is kept within a very narrow pH range of","type":"mcq","options":["6.9 - 7.1","6.35 - 735","7.35 to 7.45","7.3 - 7.4"],"answer":2,"why":"Blood pH is tightly held at 7.35–7.45.","check":false},{"code":"BLOOD-18","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"Specific cells that produce and release antibodies are","type":"mcq","options":["phagocytes","Neutrophils","lymphocytes","thrombocytes"],"answer":2,"why":"Lymphocytes (B-cells → plasma cells) produce antibodies.","check":false},{"code":"BLOOD-19","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"Harley is an RH+ male, and his partner Quinn is an RH- female. They decide to have children. What potential complication should they consider regarding their child's health?","type":"mcq","options":["The child may inherit a genetic condition unrelated to RH factor.","The child may inherit the RH+ factor, potentially causing Rh incompatibility.","he child may inherit the RH- factor, causing no complications","There are no complications related to RH factors in this situation."],"answer":1,"why":"An Rh+ baby of an Rh- mother risks Rh incompatibility (mother makes anti-Rh antibodies).","check":false},{"code":"BLOOD-20","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Blood","stem":"Manu has blood type A and is in need of a blood transfusion. Her sister Jemima has blood type B wants to donate. What should be considered before proceeding with the transfusion?","type":"mcq","options":["Manu can only receive blood from individuals with blood type AB.","Manu can safely receive blood from Jemima because she is a sibling.","Jemima can donate to Manu only if their Rh factors match.","Manu cannot receive blood from Jemima because their blood types are incompatible"],"answer":3,"why":"Type A and type B are incompatible — A has anti-B antibodies, so B blood would be attacked. Family relation is irrelevant.","check":false},{"code":"BUF-1","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Buffers","stem":"The fastest way of preventing large fluctuations in blood pH is through using:","type":"mcq","options":["digestive enzyme","buffers in the blood","respiratory mechanisms","renal mechanisms"],"answer":1,"why":"Chemical buffers in the blood act within seconds — the fastest line of pH defence (lungs = minutes, kidneys = hours/days).","check":false},{"code":"BUF-2","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Buffers","stem":"Proteins are natural buffers since they consist of:","type":"mcq","options":["fatty acids that can neutralise bases","negatively charged amino groups and positively charged carboxyl groups which can bind hydroxyl and hydrogen ions","positively charged amino groups and negatively charged carboxyl groups which can bind hydrogen and hydroxyl ions","positively charged amino groups which can bind hydrogen ions"],"answer":2,"why":"Proteins buffer because they have positively charged amino groups (bind OH-) and negatively charged carboxyl groups (bind H+).","check":false},{"code":"BUF-3","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Buffers","stem":"Write the reaction when CO2 dissolves in blood (the bicarbonate buffer), and explain how it helps control blood pH.","type":"reveal","answerText":"CO2 + H2O <-> H2CO3 (carbonic acid) <-> H+ + HCO3- (bicarbonate). The extra H+ is mopped up by the protein HAEMOGLOBIN in red cells and buffered by BICARBONATE in plasma, keeping blood pH at 7.35–7.45. If H+ rises too far you get ACIDOSIS; enzymes then can't work properly.","why":"Bicarbonate is the body's main plasma buffer; the lungs adjust CO2 to fine-tune pH.","check":false},{"code":"BUF-4","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Buffers","stem":"Buffers are chemical sponges that keep the pH in the acidic range.","type":"mcq","options":["True","False"],"answer":1,"why":"False — buffers keep pH stable within the NORMAL range (≈7.4), not in the acidic range.","check":false},{"code":"BUF-5","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Buffers","stem":"The following is NOT an example of a buffering system in the human body.","type":"mcq","options":["Protein buffer","Carbohydrate-lipid buffer","Phosphate buffer","Bicarbonate-Carbonic Acid Buffer"],"answer":1,"why":"There is no 'carbohydrate-lipid buffer'. Real body buffers: bicarbonate, phosphate and protein systems.","check":false},{"code":"INTEG-1","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Integumentary System","stem":"Skin consists of","type":"mcq","options":["dermis and subcutaneous fat","epidermis and dermis","epidermis, dermis and hypodermis","epidermis"],"answer":2,"why":"In this course the skin/integument is taught as three layers: epidermis, dermis and hypodermis (subcutaneous).","check":false},{"code":"INTEG-2","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Integumentary System","stem":"The tissue that supports the dermis is called","type":"mcq","options":["dense regular connective tissue","smooth muscle","stratified squamous epithelium","dense irregular connective tissue"],"answer":3,"why":"The dermis is dense IRREGULAR connective tissue (criss-crossing collagen for multi-directional strength).","check":false},{"code":"INTEG-3","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Integumentary System","stem":"The looser tissue that anchors skin to the body while allowing the skin to slide freely over body structures is","type":"mcq","options":["blood","dense regular connective tissue","stratified squamous epithelium","adipose tissue"],"answer":3,"why":"The hypodermis (subcutaneous adipose tissue) anchors skin yet lets it slide over deeper structures.","check":false},{"code":"INTEG-4","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Integumentary System","stem":"Which layer of the skin receives the most nourishment?","type":"mcq","options":["epidermis and dermis","subcutaneous fat","dermis","epidermis"],"answer":2,"why":"The dermis is vascular, so it nourishes the skin; the epidermis is avascular and fed by diffusion from the dermis.","check":false},{"code":"INTEG-5","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Integumentary System","stem":"Where in the epidermis does mitosis occur?","type":"mcq","options":["stratum corneum","dermis","stratum basale layer","stratum spinosum"],"answer":2,"why":"Mitosis occurs in the stratum basale (the deepest layer of dividing stem cells).","check":false},{"code":"INTEG-6","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Integumentary System","stem":"The epidermis consists of overlapping cells that are strong and waterproof ensuring the outer boundary to the body is continuous with no gaps or breaks to ensure the body is fully protected. The outermost cells of the body are","type":"mcq","options":["Granulocytes","Langherhans cells","Melanocytes","Keratinocytes"],"answer":3,"why":"Keratinocytes make up most of the epidermis and its tough, waterproof outer surface.","check":false},{"code":"INTEG-7","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Integumentary System","stem":"In certain areas of the body where the epidermis needs to be a bit thicker, the dermal papillae project up into the epidermis causing ridges known which we know as","type":"mcq","options":["pain receptors","corns","finger and toe prints","leather"],"answer":2,"why":"Dermal papillae pushing into the epidermis create the ridges we see as finger/toe prints.","check":false},{"code":"INTEG-8","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Integumentary System","stem":"The cells that help to protect the DNA inside skin cells are called","type":"mcq","options":["haemocytes","melanocytes","melonspermā","Keratinocytes"],"answer":1,"why":"Melanocytes make melanin, which shields skin-cell DNA from UV damage.","check":false},{"code":"INTEG-9","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Integumentary System","stem":"The structures within the integumentary system that are found in hairy places of the body and produce a sweat that contains more protein and fatty substances are","type":"mcq","options":["apocrine glands","sebaceous glands","eccrine glands","mammary glands"],"answer":0,"why":"Apocrine glands (in hairy areas: armpits, groin) secrete a thicker, protein/fat-rich sweat.","check":false},{"code":"INTEG-10","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Integumentary System","stem":"The skin and hair are soft, waterproof and non-brittle due to secretions from the","type":"mcq","options":["apocrine glands","sudoriferous glands","sebaceous glands","ceruminous glands"],"answer":2,"why":"Sebaceous glands secrete oily sebum that keeps skin and hair soft and waterproof.","check":false},{"code":"INTEG-11","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Integumentary System","stem":"The bacteria and fungi that live on and within the skin without causing disease are","type":"mcq","options":["viruses","teleflora","normal flora","pathogenic flora"],"answer":2,"why":"Normal flora = harmless microbes that live on/in the skin.","check":false},{"code":"INTEG-12","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Integumentary System","stem":"Skin cells can secrete a natural antibiotic that kills many microbes we come into contact with during the day. These natural antibiotics are called","type":"mcq","options":["acid mantle","defensins","augmentin","melanin"],"answer":1,"why":"Defensins are the skin's natural antimicrobial peptides ('natural antibiotics').","check":false},{"code":"INTEG-13","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Integumentary System","stem":"Which of the following is a function of skin?","type":"mcq","options":["produces energy for the body","helps with making or synthesising vitamin D for the body","helps attach muscles to bones","stops our organs falling out"],"answer":1,"why":"Skin synthesises vitamin D (from UV). It also protects, senses, and regulates temperature.","check":false},{"code":"INTEG-14","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Integumentary System","stem":"Two ways the integumentary system helps to maintain our temperature when we are in a cold environment","type":"mcq","options":["vasodilation and piloerection","shivering and vasoconstriction","vasoconstriction and piloerection","shivering and piloerection"],"answer":2,"why":"In the cold, skin conserves heat by vasoconstriction and piloerection (hairs stand up to trap air).","check":false},{"code":"INTEG-15","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Integumentary System","stem":"Anne has developed creases in the skin as she has gotten older. This is due to the loss of","type":"mcq","options":["epithelial cells of within the epidermis","adipose tissue","skeletal muscle in her face","collagen fibres within the dermis"],"answer":3,"why":"Wrinkles come from loss of collagen (and elastin) in the dermis with age.","check":false},{"code":"INTEG-16","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"The Integumentary System","stem":"Juju hasn't seen her brother for many years. They are finally reunited and hug each other very firmly! Juju feels a bit squashed as her","type":"mcq","options":["pacinian corpuscles are triggered","chemoreceptors are triggered","thermoreceptors are triggered","photoreceptors are triggered"],"answer":0,"why":"Pacinian corpuscles are deep-pressure receptors — triggered by a firm squeeze.","check":false},{"code":"HEAT-1","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Heat and Temperature","stem":"Which method of heat transfer occurs when heat moves directly from one object to another through physical contact?","type":"mcq","options":["conduction","convection","evaporation","radiation"],"answer":0,"why":"Conduction = heat moving by direct physical contact between objects.","check":false},{"code":"HEAT-2","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Heat and Temperature","stem":"A nurse applies a warm compress directly to a patient’s lower back to relieve muscle pain. Which method of heat transfer is primarily involved?","type":"mcq","options":["radiation","evaporation","conduction","convection"],"answer":2,"why":"A warm compress touching the skin transfers heat by conduction (direct contact).","check":false},{"code":"HEAT-3","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Heat and Temperature","stem":"Heat loss that occurs when air or fluid moves across the surface of the skin is known as:","type":"mcq","options":["conduction","radiation","convection","metabolism"],"answer":2,"why":"Convection = heat carried away by moving air or fluid across the skin.","check":false},{"code":"HEAT-4","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Heat and Temperature","stem":"Which nursing intervention best demonstrates convection as a method of heat loss?","type":"mcq","options":["Applying an ice pack to the skin","Applying an ice pack to the skin","Leaving a patient uncovered near an open window","Using a reflective foil blanket"],"answer":2,"why":"Air moving past an uncovered patient near an open window = convective heat loss.","check":false},{"code":"HEAT-5","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Heat and Temperature","stem":"Radiation refers to heat transfer that occurs:","type":"mcq","options":["When moisture evaporates from the skin","Only in cold environments","Through direct physical contact","Through electromagnetic waves without direct contact"],"answer":3,"why":"Radiation = heat transfer by electromagnetic (infrared) waves, no contact needed.","check":false},{"code":"HEAT-6","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Heat and Temperature","stem":"Which situation best illustrates radiation heat loss in a hospital setting?","type":"mcq","options":["A patient receiving IV fluids at room temperature","A patient touching a cold metal bed rail","A patient lying uncovered in a cool room","A patient sweating after exercise"],"answer":2,"why":"An uncovered patient radiating heat to cooler surroundings = radiation loss.","check":false},{"code":"HEAT-7","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Heat and Temperature","stem":"Which mechanism of heat loss is most closely associated with sweating?","type":"mcq","options":["conduction","radiation","evaporation","secretion"],"answer":2,"why":"Sweating cools by evaporation — energy is taken up as sweat turns to vapour.","check":false},{"code":"HEAT-8","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Heat and Temperature","stem":"Why is evaporation an effective method of reducing body temperature in a febrile patient?","type":"mcq","options":["Heat is released when sweat dries on the skin","Sweat insulates the body from heat","Skin temperature increases blood flow","Water transports heat into the body"],"answer":0,"why":"As sweat evaporates it carries heat away from the skin, lowering body temperature.","check":false},{"code":"HEAT-9","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Heat and Temperature","stem":"Infants are at higher risk of heat loss compared to adults primarily because they:","type":"mcq","options":["Have slower metabolic rates","Sweat excessively","Have thicker layers of subcutaneous fat","Have a larger body surface area relative to their weight"],"answer":3,"why":"Infants have a large surface-area-to-weight ratio, so they lose heat quickly.","check":false},{"code":"HEAT-10","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Heat and Temperature","stem":"A patient with hypothermia is rewarmed using a forced‑air warming blanket (e.g. Bair Hugger). Which primary method of heat transfer does this intervention use?","type":"mcq","options":["radiation","convection","evaporation","conduction"],"answer":1,"why":"A forced-air warming blanket (Bair Hugger) warms by convection (moving warm air).","check":false},{"code":"HOMEO-1","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis","stem":"The ability of the body to maintain a stable internal environment despite changes to the external environment is known as","type":"mcq","options":["homostasis","osmosis","homeostasis","homogenation"],"answer":2,"why":"Homeostasis = maintaining a stable internal environment despite external change.","check":false},{"code":"HOMEO-2","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis","stem":"Define each homeostasis control term: stimulus, variable, receptor, and effector.","type":"reveal","answerText":"Terminology: STIMULUS = a change in the variable being regulated; VARIABLE = the thing being regulated (e.g. temperature); RECEPTOR = detects the change; EFFECTOR = carries out the response.","why":"","check":false},{"code":"HOMEO-3","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis","stem":"An example of an organ is the","type":"mcq","options":["cardiovascular system","red blood cell","neuron","pancreas"],"answer":3,"why":"The pancreas is an organ. (A system = cardiovascular; a cell = RBC/neuron.)","check":false},{"code":"HOMEO-4","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis","stem":"The difference between negative and positive feedback is","type":"mcq","options":["negative feedback detects the stimulus while positive feedback does not require a stimulus","positive feedback moves the system closer to the normal range, while negative feedback moves the system further from the normal range","positive feedback must have a stimulus, while negative doesn't need one","negative feedback reverses changes in a system, whilst positive feedback amplifies changes to a system"],"answer":3,"why":"Negative feedback REVERSES a change (back to normal); positive feedback AMPLIFIES it.","check":false},{"code":"HOMEO-5","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis","stem":"An example of a positive feedback mechanism is","type":"mcq","options":["regulation of blood calcium levels","regulation of blood clotting","regulation of body temperature","regulation of blood glucose levels"],"answer":1,"why":"Blood clotting is positive feedback — each step accelerates the next until the clot forms (also childbirth, lactation).","check":false},{"code":"HOMEO-6","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis","stem":"Two control mechanisms for any homeostatic mechanism are the","type":"mcq","options":["nervous and endocrine systems","respiratory and cardiovascular system","endocrine and nervous system","urinary and nervous systems"],"answer":0,"why":"The nervous and endocrine systems are the body's two main control systems.","check":false},{"code":"HOMEO-7","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis","stem":"When the blood glucose levels decrease, the releases the hormone . This hormone travels via the to the liver. The hormone causes the liver to convert stored into which is released into the blood to increase blood levels to normal range.","type":"reveal","answerText":"Fill-in: when blood glucose drops, the PANCREAS releases GLUCAGON. It travels via the BLOOD to the liver, causing the liver to convert stored GLYCOGEN into GLUCOSE, which is released to raise blood glucose back to normal.","why":"","check":false},{"code":"HOMEO-8","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis","stem":"In the above example where the blood glucose level has dropped, match the parts from the example to the terminology on the left.","type":"reveal","answerText":"Match to the low-glucose example: STIMULUS = falling blood glucose; RECEPTOR/CONTROL CENTRE = pancreas; EFFECTOR = liver; the ENDOCRINE SYSTEM carries the hormone (glucagon); EFFECT = blood glucose rises.","why":"","check":false},{"code":"HOMEO-9","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis","stem":"Which hormone increases blood calcium levels by stimulating bone resorption and increasing calcium absorption in the intestines?","type":"mcq","options":["Insulin","Parathyroid hormone","Calcitonin","Cortisol"],"answer":1,"why":"Parathyroid hormone (PTH) RAISES blood calcium (bone resorption, gut & kidney reabsorption).","check":false},{"code":"HOMEO-10","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis","stem":"A patient with chronic kidney disease is likely to experience calcium imbalance due to decreased production of:","type":"mcq","options":["Vitamin A","Vitamin K","Vitamin D3","Calcitrol"],"answer":3,"why":"Diseased kidneys can't make calcitriol (calcitrol) — the ACTIVE vitamin D they normally produce from D3 — so calcium absorption falls. (Vitamin D3 itself is made in skin.)","check":false},{"code":"HOMEO-11","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis","stem":"In nursing assessment, which clinical manifestation indicates hypocalcemia?","type":"mcq","options":["Bradycardia","Muscle weakness","Positive Trousseau's sign","Polyuria"],"answer":2,"why":"A positive Trousseau's sign (carpal spasm) indicates hypocalcaemia.","check":false},{"code":"HOMEO-12","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis","stem":"Which process in bone tissue helps maintain normal blood calcium levels during periods of low dietary calcium intake?","type":"mcq","options":["Bone resorption","production of collagen","formation of cartilage","Bone mineralization (also known as deposition)"],"answer":0,"why":"Bone resorption releases stored calcium to keep blood calcium normal when dietary intake is low.","check":false},{"code":"HOMEO-13","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis","stem":"A patient receiving IV calcium replacement therapy requires careful monitoring of:","type":"mcq","options":["Respiratory rate","White blood cell count","Heart rhythm","Blood pressure"],"answer":2,"why":"IV calcium affects the heart — monitor heart rhythm (cardiac monitoring).","check":false},{"code":"HOMEO-14","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis","stem":"During pregnancy, which physiological change occurs to meet increased calcium demands?","type":"mcq","options":["Decreased parathyroid hormone secretion","increased calcium absorption through the intestine","the kidney increases calcium reabsorption into the blood (rather then peeing it out)","Decreased bone mineralization"],"answer":1,"why":"In pregnancy, intestinal calcium absorption increases to meet the extra demand.","check":false},{"code":"HOMEO-15","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis","stem":"Interstitial fluid refers to the fluid that","type":"mcq","options":["that sits outside of cells","is also known as cytosol","is the cytoplasm","is inside cells"],"answer":0,"why":"Interstitial fluid is the fluid that sits OUTSIDE cells, between them (part of ECF).","check":false},{"code":"HOMEO-16","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis","stem":"The hormone that stimulates uterine contractions is","type":"mcq","options":["oestrogen","oxytocin","progesteron","oxymoron"],"answer":1,"why":"Oxytocin stimulates uterine contractions (a positive-feedback loop in labour).","check":false},{"code":"HOMEO-17","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis","stem":"One way the integumentary system works to help maintain our temperature in a cold environment is:","type":"mcq","options":["shivering","sweating","vasoconstriction","widening the blood vessels in the skin","No answer text provided."],"answer":2,"why":"In the cold the skin vasoconstricts to conserve heat.","check":false},{"code":"HOMEOT-1","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis and Terminology","stem":"Use a textbook or an \"appendice\" that contains the following \"suffix\" leuco and \"cyte\". What does the term leucocyte mean?","type":"mcq","options":["red blood cell","bone cell","white blood cells","merkel cell"],"answer":2,"why":"Leuco- (white) + -cyte (cell) = white blood cell.","check":false},{"code":"HOMEOT-2","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis and Terminology","stem":"The layers of cells that make up the outer layer of the skin is called","type":"mcq","options":["stratified squamous epithelium","reticular tissue","simple squamous epithelium","stratified columnar epithelium"],"answer":0,"why":"The epidermis is stratified squamous epithelium.","check":false},{"code":"HOMEOT-3","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis and Terminology","stem":"A virus is not considered a living thing because it is unable to reproduce on its own. It required a host cell. Which level of biological organisation would a virus best fit in?","type":"mcq","options":["organism","molecule","organ","cell"],"answer":1,"why":"A virus isn't a cell — it's essentially a molecular particle (nucleic acid + protein coat), so it best fits the 'molecule' level.","check":false},{"code":"HOMEOT-4","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis and Terminology","stem":"The dorsal body cavity relates to the","type":"mcq","options":["spinal cavity only","pelvic and abdominal cavities","spinal and cranial cavities","heart, lungs and mediastinum"],"answer":2,"why":"The dorsal body cavity = the cranial + spinal (vertebral) cavities.","check":false},{"code":"HOMEOT-6","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis and Terminology","stem":"A tissue is","type":"mcq","options":["a group of different cells that carry out one function","a group of the same cells that have a specific function","a group of different types of cells, that carry out different functions so the tissue work better","a group of similar cells arranged in such a way each cell has a different role"],"answer":1,"why":"A tissue = a group of similar (same) cells performing a specific function.","check":false},{"code":"HOMEOT-7","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis and Terminology","stem":"Using an \"appendice\" or your text, what does \"hyper\" and \"therm\" mean. If we put them together to form HYPERTHERMIA what does this refer to?","type":"mcq","options":["a normal body temperature","I don't think there is a word like this","a higher than normal body temperature","a lower than normal body temperature"],"answer":2,"why":"Hyper- (above) + therm (heat) = hyperthermia = above-normal body temperature.","check":false},{"code":"HOMEOT-8","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis and Terminology","stem":"Place the following in order from largest to smallest: lung, smooth muscle, erthrocyte, oxygen","type":"mcq","options":["lung, erythrocyte, smooth muscle, oxygen","erythrocyte, lung, smooth muscle, oxygen","lung, smooth muscle, erythrocyte, oxygen","oxygen, erythrocyte, smooth muscle, lung"],"answer":2,"why":"Largest → smallest: lung (organ) → smooth muscle (tissue) → erythrocyte (cell) → oxygen (molecule).","check":false},{"code":"HOMEOT-9","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis and Terminology","stem":"Using and appendices or appendix find out what these suffixes and prefixes mean: thrombo embo ism Thus, what is the name of a medical condition where a blood clot is moving around the body?","type":"mcq","options":["thrombokinesis","thromboembolism","thrombolism","thromboembokinesis"],"answer":1,"why":"Thrombo- (clot) + embol (plug) + -ism = thromboembolism (a clot moving in the circulation).","check":false},{"code":"HOMEOT-10","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis and Terminology","stem":"Liquid wastes are removed from the body is referred to as","type":"mcq","options":["egestion","secretion","excretion","sweating"],"answer":2,"why":"Excretion = removal of liquid metabolic wastes (e.g. urine). (Egestion = faeces/undigested food.)","check":false},{"code":"HOMEOT-11","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis and Terminology","stem":"When standing in the anatomical position, the palms of the hands are","type":"mcq","options":["facing forward (anterior)","facing up (superior)","facing the thighs","facing backward (posterior)"],"answer":0,"why":"In the anatomical position the palms face forward (anterior), thumbs pointing away from the body.","check":false},{"code":"HOMEOT-12","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis and Terminology","stem":"The navel (belly button) is .................................. to the thorax","type":"mcq","options":["superior","posterior","lateral","inferior"],"answer":3,"why":"The navel is inferior (below) the thorax.","check":false},{"code":"HOMEOT-13","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis and Terminology","stem":"Timothy has a fever. The best way to help cool him down is to","type":"mcq","options":["stick Tim in an ice bath","blow a fan in his face","circulate air by aiming a fan at the wall","put some ice cubes on his neck and face"],"answer":1,"why":"Blowing a fan at his face cools by convection — safe and effective. An ice bath causes shivering (which makes more heat).","check":false},{"code":"HOMEOT-14","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis and Terminology","stem":"Anne's dog Ianto is feeling cold at night. Anne can help keep Ianto warm by the principle of conduction by","type":"mcq","options":["blow hot air from a heater at him","placing a sheepskin on the floor for him to sleep on","put Ianto in a sunny spot","Use an infared lamp over him"],"answer":1,"why":"Conduction needs contact: a sheepskin lets the dog gain/keep warmth by direct contact (the others are radiation/convection).","check":false},{"code":"HOMEOT-15","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Homeostasis and Terminology","stem":"From a purely biological context, identical offspring produced from one parent are formed by","type":"mcq","options":["paternal twins","anerobic reproduction","sexual reproduction","asexual reproduction"],"answer":3,"why":"Asexual reproduction = one parent → genetically identical offspring.","check":false},{"code":"OSMO-1","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Osmosis and Fluid Movement","stem":"In osmosis across a selectively permeable membrane, which way does water move, and why?","type":"reveal","answerText":"Water moves from where there is MORE water (low solute concentration) to where there is LESS water (high solute concentration) — i.e. toward the more concentrated solution — until the two sides even out. Only water crosses; the solute can't.","why":"Water follows solute: 'salt sucks water toward it.'","check":false},{"code":"OSMO-2","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Osmosis and Fluid Movement","stem":"After a salty meal you become dehydrated. What happens to blood volume and blood pressure, and which osmosis direction explains it?","type":"reveal","answerText":"Blood volume DECREASES and blood pressure DECREASES. The salt makes the gut/tissue fluid more concentrated, so water is drawn OUT of the blood by osmosis — like water leaving 15% sucrose tubing sitting in a 40% sucrose beaker.","why":"Less water in the vessels = less volume = lower pressure.","check":false},{"code":"OSMO-3","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Osmosis and Fluid Movement","stem":"The kidney's main job is to get rid of extra fluid and waste material in your blood. Kidneys harmed by disease, injury, or birth defects lose their filtering ability, and cannot perform the excretory functions needed to maintain homeostasis. During dialysis, what components of the person's blood is filtered out of the semi-porous membrane?","type":"mcq","options":["RBCs and dead WBCs","plasma proteins","urea and sugars","urea and salt"],"answer":3,"why":"Dialysis removes small waste solutes — urea and excess salts — while keeping blood cells and plasma proteins.","check":false},{"code":"OSMO-4","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Osmosis and Fluid Movement","stem":"Define each transport term: diffusion, facilitated diffusion, and osmosis.","type":"reveal","answerText":"Definitions: DIFFUSION = solutes move down their gradient (high → low). FACILITATED DIFFUSION = the same, but via a membrane protein (still passive). OSMOSIS = water moves across a selectively permeable membrane toward higher solute concentration.","why":"","check":false},{"code":"OSMO-5","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Osmosis and Fluid Movement","stem":"What is the driving force of filtration, and does it use energy (ATP)?","type":"reveal","answerText":"Filtration is a PASSIVE transport process — it uses hydrostatic (blood) pressure as the driving force and does NOT use energy from ATP.","why":"","check":false},{"code":"OSMO-6","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Osmosis and Fluid Movement","stem":"A cell is placed in a solution and after a while, it shrinks - what kind of solution has the cell been placed in?","type":"mcq","options":["hypertonic solution","hypotonic solution","isotonic solution"],"answer":0,"why":"A cell that shrinks has lost water to a hypertonic solution (more solute outside).","check":false},{"code":"OSMO-7","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Osmosis and Fluid Movement","stem":"How does temperature affect the rate of diffusion, and why? (e.g. dissolving coffee in cold vs hot water)","type":"reveal","answerText":"Higher temperature gives particles more kinetic energy, so they move faster and diffuse FASTER. So instant coffee dissolves and spreads faster in hot water than in cold.","why":"More heat = more particle motion = quicker mixing.","check":false},{"code":"OSMO-8","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Osmosis and Fluid Movement","stem":"What happens to red blood cells (RBCs) that are placed in an isotonic solution?","type":"mcq","options":["cell bursts","cell shrinks","cell integrity remains the same"],"answer":2,"why":"In an isotonic solution there's no net water movement, so the RBC stays the same (integrity unchanged).","check":false},{"code":"OSMO-9","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Osmosis and Fluid Movement","stem":"Which of the following is an isotonic saline solution. What could happen if the concentration is higher than it should be?","type":"mcq","options":["0.09% ; blood cells may gain water and burst","0.9% NaCl;  blood cells may lose water and shrink","0.9%; KCl  blood cells may  lose water andshrink","0.09% ; blood cells may gain water and burst"],"answer":1,"why":"0.9% NaCl is isotonic saline. If it were more concentrated (hypertonic), cells would lose water and shrink.","check":false},{"code":"OSMO-10","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Osmosis and Fluid Movement","stem":"In the cell membrane, different proteins play different transport functions. In which of the protein-mediated processes the protein changes shape but does not use energy from ATP to transport molecules. The molecules move along their concentration gradient.","type":"mcq","options":["simple diffusion","Proton pump action","Osmosis","Facilitated diffusion"],"answer":3,"why":"Facilitated diffusion: the carrier protein changes shape to move molecules DOWN their gradient without ATP.","check":false},{"code":"FLU-1","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Homeostasis is:","type":"mcq","options":["maintaining the body despite changes","the way the body adjusts itself","regulation of the body","maintaining a stable internal environment, despite changes in the external environment"],"answer":3,"why":"Homeostasis = maintaining a stable internal environment despite external changes.","check":false},{"code":"FLU-2","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Chemical messengers that are released in the blood are called","type":"mcq","options":["enzymes","hormones","amino acids","antibodies"],"answer":1,"why":"Hormones are chemical messengers released into the blood.","check":false},{"code":"FLU-3","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"A system which works to reduce the stimulus is called","type":"mcq","options":["positive feedback","negative feedback","hyposecretion","hypersecretion"],"answer":1,"why":"Negative feedback works to reduce/reverse the stimulus (back toward normal).","check":false},{"code":"FLU-4","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Hormonal responses are different to neural responses because","type":"mcq","options":["hormones are fast acting, and the effects last longer than nerve responses","nerves are fast acting and are longer lasting than hormonal effects","nerves are slow acting, and longer lasting than hormones","hormones are slow acting, and the effects are longer lasting than nerves"],"answer":3,"why":"Hormones are slower to act than nerves but their effects last longer.","check":false},{"code":"FLU-5","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"The hormone that is released when the body is dehydrated is","type":"mcq","options":["vasopressin","PTH","oxytocin","ADH"],"answer":3,"why":"ADH (antidiuretic hormone) is released when dehydrated. (Note: 'vasopressin' is another name for ADH.)","check":false},{"code":"FLU-6","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"An increase in plasma osmolarity will cause the secretion of","type":"mcq","options":["ADH","insulin","thryoxine","PTH"],"answer":0,"why":"Rising plasma osmolarity (concentrated blood) triggers ADH to conserve water.","check":false},{"code":"FLU-7","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"A low level of calcium in the blood plasma causes the release of","type":"mcq","options":["glucagon","insulin","PTH","calcitonin"],"answer":2,"why":"Low blood calcium triggers PTH (parathyroid hormone) to raise it.","check":false},{"code":"FLU-8","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Calcitonin targets which cells in the skeleton?","type":"mcq","options":["osteoclasts","osteoblasts","vitamin D cells","osteocytes"],"answer":0,"why":"Calcitonin acts on osteoclasts, inhibiting them so less calcium is released from bone (lowers blood Ca).","check":false},{"code":"FLU-9","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Calcitonin is produced by","type":"mcq","options":["osteoblasts","vitamin D","thyroid gland","parathyroid gland"],"answer":2,"why":"Calcitonin is produced by the thyroid gland.","check":false},{"code":"FLU-10","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"The hormone responsible for controlling your metabolic rate is","type":"mcq","options":["TSH","adrenaline","thyroxine","growth hormone"],"answer":2,"why":"Thyroxine (T4) controls the body's metabolic rate.","check":false},{"code":"FLU-11","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"The thyroid gland is","type":"mcq","options":["is on top of your kidneys","part of the brain","in your thorax","just below your voice box"],"answer":3,"why":"The thyroid gland sits in the neck, just below the larynx (voice box).","check":false},{"code":"FLU-12","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"The hormone produced by the thyroid gland and is responsible for depositing calcium into bone is called","type":"mcq","options":["thyroxine","TSH","calcitonin","Iodine"],"answer":2,"why":"Calcitonin (from the thyroid) lowers blood calcium by depositing it into bone.","check":false},{"code":"FLU-13","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"When glucose levels are high, which gland is stimulated to secrete insulin?","type":"mcq","options":["pancreas","liver","hypothalamus","thymus"],"answer":0,"why":"High blood glucose stimulates the pancreas (beta cells) to release insulin.","check":false},{"code":"FLU-14","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"When blood glucose levels are low, the liver is stimulated to","type":"mcq","options":["change stored glycogen into glucose to be released into the blood","change stored glucagon into glucose to be released into the blood","change stored glucagon into glycogen to be released into the blood","change stored glucose into glycogen to be released into the blood"],"answer":0,"why":"When glucose is low, the liver converts stored glycogen → glucose and releases it (glycogenolysis).","check":false},{"code":"FLU-15","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"In a cup of coffee, the water is the","type":"mcq","options":["solute","super-solute","solution","solvent"],"answer":3,"why":"In coffee, water is the solvent (it dissolves the solutes).","check":false},{"code":"FLU-16","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"A solution where you can see the particles have not actually dissolved, is called","type":"mcq","options":["a super-saturated solution","a colloid","a suspension","a solution"],"answer":2,"why":"A suspension has visible particles that settle out — they haven't truly dissolved.","check":false},{"code":"FLU-17","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"The most important inorganic molecule in living matter is","type":"mcq","options":["amino acids","carbohydrates","lipids","water"],"answer":3,"why":"Water is the most important inorganic molecule in living matter.","check":false},{"code":"FLU-18","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Substances that taste sour, and can react with metals are","type":"mcq","options":["alkali","bases","acids","salts"],"answer":2,"why":"Acids taste sour and react with metals; they are proton (H+) donors.","check":false},{"code":"FLU-19","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Substances that are better known as proton acceptors are","type":"mcq","options":["acids","bases","water","salts"],"answer":1,"why":"Bases are proton (H+) acceptors.","check":false},{"code":"FLU-20","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"The more H+ ions in a solution the","type":"mcq","options":["the higher the alkalinity of the solution","greater the acidity of the solution","lower the acidity of the solution","the higher the pH"],"answer":1,"why":"More H+ ions = greater acidity (lower pH).","check":false},{"code":"FLU-21","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"The relative concentration of hydrogen ions in various body fluids is measured in concentrations called","type":"mcq","options":["hydrometer","PH","pH units","log units"],"answer":2,"why":"H+ concentration is expressed in pH units.","check":false},{"code":"FLU-22","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"At which pH does the number of hydrogen ions equal the number of hydroxyl ions?","type":"mcq","options":["5","7","2","14"],"answer":1,"why":"At pH 7 the numbers of H+ and OH- ions are equal (neutral).","check":false},{"code":"FLU-23","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Blood has a pH of 7.4. We would say blood is","type":"mcq","options":["slightly acidic","a buffer","neutral","slightly alkaline"],"answer":3,"why":"Blood at pH 7.4 is slightly alkaline (above neutral 7).","check":false},{"code":"FLU-24","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"A chemical that resists abrupt and large changes in pH of body fluids, by either releasing or absorbing H+ is known as","type":"mcq","options":["an enzyme","erythropoiten","water","a buffer"],"answer":3,"why":"A buffer resists pH change by releasing or absorbing H+.","check":false},{"code":"FLU-25","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"When someone is anxious and has a panic attack, often their blood has become quite alkalotic. They might be asked to breathe in and out of a paper bag. The purpose of this is to","type":"mcq","options":["get them to ventilate faster and lower the pH","give them something to focus on","to get them to rebreathe the carbon dioxide, in turn increasing carbonic acid in the body, and lowering the pH till it returns to normal","to get them to rebreathe the carbon dioxide, in turn increasing carbonic acid in the body, and raising the pH until it returns to normal"],"answer":2,"why":"Rebreathing CO2 from a paper bag raises carbonic acid, lowering the pH back to normal (treats the alkalosis of hyperventilation).","check":false},{"code":"FLU-26","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"When the blood turns acidic, the kidneys","type":"mcq","options":["retain hydrogen ions, and exrete bicarbonate ions","act like a sponge and just soak up all the hydrogen ions, and release them when they are needed","retain bicarbonate ions, and excrete hydrogen ions","release aldosterone"],"answer":2,"why":"When blood is acidic, the kidneys excrete H+ and retain (reabsorb) bicarbonate to buffer it.","check":false},{"code":"FLU-27","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"An example of a positive feedback mechanism is","type":"mcq","options":["increasing blood glucose levels","helping blood to clot","reducing dehydration by reabsorbing more water in the kidney tubules","increasing calcium uptake by bones"],"answer":1,"why":"Blood clotting is a positive-feedback mechanism (it amplifies).","check":false},{"code":"FLU-28","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"When glucose molecules are in an area of low concentration, and need to be moved to an area of high glucose concentration, they move by","type":"mcq","options":["active transport","osmosis","selective permeability","faciliated diffusion"],"answer":0,"why":"Moving glucose from low → high concentration is uphill, so it needs active transport (ATP).","check":false},{"code":"FLU-29","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"One form of passive transport requires the help of a substance like insulin to change the permeability of the cells, by changing the shape of the leakage channels to allow glucose to move from high to low concentration. This kind of passive transport is known as","type":"mcq","options":["facilitated diffusion","active transport","simple diffusion","osmosis"],"answer":0,"why":"Insulin-assisted, protein-mediated, down-gradient, no-ATP glucose entry = facilitated diffusion.","check":false},{"code":"FLU-30","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"In a homeostatic mechanism, the effector","type":"mcq","options":["produces a change that will influence the stimulus","produces a change that stimulates the control centre","determines the response","detects the stimulus"],"answer":0,"why":"An effector produces a change that influences (corrects) the stimulus.","check":false},{"code":"FLU-31","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"If a solution gets too concentrated with solutes, it can form a supersaturated solution. In the human body, a super-saturated solution can result in","type":"mcq","options":["kidney stones","oedema","a swollen brain","appendicitis"],"answer":0,"why":"A supersaturated solution in the body can precipitate as kidney stones.","check":false},{"code":"FLU-32","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"The number of particles in a solution is measured by","type":"mcq","options":["hedgehogs","pH","moles","voles"],"answer":2,"why":"The number of particles in a solution is measured in moles.","check":false},{"code":"FLU-33","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Diffusion will occur more slowly in all of the following situations EXCEPT","type":"mcq","options":["high pressure","if there is more solute","large molecule size","low temperature"],"answer":0,"why":"Diffusion is FASTER (not slower) at high pressure. It's slower with more solute, larger molecules, or lower temperature.","check":false},{"code":"FLU-34","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"The movement of a solvent from an area with a low solute concentration, to an area where there is a higher solute concentration is called","type":"mcq","options":["osmosis","filtration","facilitated diffusion","simple diffusion"],"answer":0,"why":"Osmosis = solvent (water) moving from low solute → high solute concentration.","check":false},{"code":"FLU-35","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Cells are like a closed container. Adding water will","type":"mcq","options":["have no pressure effects","increase the osmotic pressure inside","increase the hydrostatic pressure inside","decrease the hydrostatic pressure inside"],"answer":2,"why":"Adding water to a closed cell raises the hydrostatic (physical) pressure inside.","check":false},{"code":"FLU-36","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"When alcohol enters the bloodstream,","type":"mcq","options":["it will decrease the osmolarity of the fluid outside the cells, causing water to move into cells, so the cells swell up.","it increases the osmolarity of the fluid outside the cells, causing water to move out of the cells, so the cells shrink.","it will decrease the osmolarity of the fluid outside the cells, causing water to move out of the cells, so the cells shrink","it will increase the osmolarity of the fluid outside the cells, causing water to move into the cells, so the cells will swell up"],"answer":1,"why":"Alcohol raises ECF osmolarity, so water leaves cells and they shrink.","check":false},{"code":"FLU-37","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Two places in the body where filtration occurs is","type":"mcq","options":["alveoli and capillaries","glomeruli and alveoli","alveoli and kidneys","glomeruli and capillaries"],"answer":3,"why":"Filtration (pressure-driven) occurs in the kidney glomeruli and in capillaries.","check":false},{"code":"FLU-38","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"A red blood cell will swell and possibly burst when placed in","type":"mcq","options":["hypertonic solutions","alcohol","hypotonic solutions","isotonic solutions"],"answer":2,"why":"In a hypotonic solution, water rushes into the RBC — it swells and may burst (haemolysis).","check":false},{"code":"FLU-39","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"A person has diarrhoea and becomes severly dehydrated. The type of dehydration they are suffering from is","type":"mcq","options":["hypertonic","hydroponic","isotonic","hypotonic"],"answer":2,"why":"Diarrhoea loses water and salts together = isotonic dehydration.","check":false},{"code":"FLU-40","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Some cells like nerve cells, need to transport sodium out, and potassium in. This means that the sodium concentration is LOWER on the inside of the cells. This maintains the electrochemical gradient that cells need to send impulses. This is an example of","type":"mcq","options":["facilitated diffusion","filtration","active transport","passive transport"],"answer":2,"why":"Pumping Na+ out and K+ in against their gradients = active transport (the Na+/K+ pump).","check":false},{"code":"FLU-41","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Water's importance to living systems relects its","type":"mcq","options":["ability to dissolve many substances","protective qualites as it froms a resilient cushion around some organs e.g. CSF","ability to absorb and release large amounts of heat","ability to change from one state to another e.g. from liquid to gas"],"answer":0,"why":"Water's key importance is as a solvent — its ability to dissolve so many substances (it also cushions, buffers heat, etc.).","check":false},{"code":"FLU-42","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"A healthy, young woman will have","type":"mcq","options":["more water than a healthy, young male of the same age and body composition","less water than an older person","more water than a baby","less water than an infant"],"answer":3,"why":"A young woman has less body water than an infant (babies have the highest water %).","check":false},{"code":"FLU-43","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"Extracellular fluid consists of all of the following except:","type":"mcq","options":["plasma","intersitial fluid","cytosol","the fluid and jelly in the eye"],"answer":2,"why":"ECF = plasma + interstitial fluid + transcellular fluids. Cytosol is INTRAcellular, so it's the exception.","check":false},{"code":"FLU-44","module":2,"moduleName":"Module 2 · Blood, Acid-Base, Skin, Homeostasis & Fluids","quiz":"Fluids, Acids and Bases","stem":"The word electrolyte means","

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#4f46e5">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>BN1 Drill — Health Science 1</title>
<style>
  :root{
    --bg:#f4f5fb; --surface:#ffffff; --surface2:#eef0f9;
    --text:#1a1d29; --muted:#6b7180; --border:#e2e5f0;
    --accent:#4f46e5; --accent-soft:#eae9ff; --accent-text:#fff;
    --good:#0f9d6b; --good-soft:#e2f6ee; --bad:#e0483d; --bad-soft:#fdecea;
    --warn:#b45309; --warn-soft:#fdf3e2;
    --shadow:0 1px 3px rgba(20,22,40,.08),0 6px 20px rgba(20,22,40,.06);
    --radius:16px;
  }
  [data-theme="dark"]{
    --bg:#0f1117; --surface:#181b24; --surface2:#20242f;
    --text:#eceef5; --muted:#9aa0b0; --border:#2a2f3c;
    --accent:#7c78ff; --accent-soft:#262552; --accent-text:#fff;
    --good:#34d399; --good-soft:#123528; --bad:#f87171; --bad-soft:#3a1c1c;
    --warn:#fbbf24; --warn-soft:#392b12;
    --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 26px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5; -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap{max-width:640px;margin:0 auto;padding:0 16px 120px}
  /* top bar */
  header.top{
    position:sticky;top:0;z-index:20;background:var(--bg);
    display:flex;align-items:center;gap:10px;
    padding:14px 16px calc(12px);max-width:640px;margin:0 auto;
    border-bottom:1px solid transparent;
  }
  header.top.scrolled{border-bottom-color:var(--border)}
  .brand{font-weight:700;font-size:18px;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
  .brand .dot{width:22px;height:22px;border-radius:7px;background:var(--accent);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800}
  .brand .ver{font-size:10px;font-weight:600;color:var(--muted);align-self:flex-end;margin:0 0 3px 2px;letter-spacing:0}
  .spacer{flex:1}
  .iconbtn{
    border:1px solid var(--border);background:var(--surface);color:var(--text);
    height:38px;min-width:38px;padding:0 10px;border-radius:11px;font-size:15px;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;font-weight:600;
  }
  .iconbtn:active{transform:scale(.96)}
  .streak{color:var(--warn);font-weight:700}
  /* cards */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
  .today{padding:20px;margin:6px 0 18px;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 70%, #d946ef));color:#fff;border:none}
  .today h2{margin:0 0 4px;font-size:15px;font-weight:600;opacity:.9}
  .today .big{font-size:30px;font-weight:800;letter-spacing:-.02em;margin:0 0 14px}
  .today .big small{font-size:15px;font-weight:600;opacity:.85}
  .btn{
    display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    border:none;border-radius:13px;padding:15px 16px;font-size:16px;font-weight:700;
    cursor:pointer;background:var(--accent);color:var(--accent-text);
  }
  .btn:active{transform:scale(.985)}
  .btn.light{background:#fff;color:var(--accent)}
  .btn.ghost{background:var(--surface2);color:var(--text)}
  .btn.outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}
  .btn[disabled]{opacity:.5;cursor:default}
  .row2{display:flex;gap:10px}
  .row2 .btn{flex:1}
  .section-label{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:22px 4px 10px}
  /* progress bar */
  .bar{height:9px;border-radius:99px;background:var(--surface2);overflow:hidden}
  .bar > i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .4s}
  .bar.good > i{background:var(--good)}
  .overall{padding:16px 18px;margin-bottom:6px}
  .overall .lineflex{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
  .overall .pct{font-weight:800;font-size:19px}
  .muted{color:var(--muted);font-size:14px}
  /* module tiles */
  .tile{display:flex;align-items:center;gap:14px;padding:16px;margin-bottom:11px;cursor:pointer;width:100%;text-align:left;font:inherit;color:inherit}
  .tile:active{transform:scale(.99)}
  .tile .ring{position:relative;width:46px;height:46px;flex:none}
  .tile .ring svg{transform:rotate(-90deg)}
  .tile .ring .lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
  .tile .grow{flex:1;min-width:0}
  .tile .t-name{font-weight:700;font-size:15.5px;letter-spacing:-.01em}
  .tile .t-sub{font-size:13px;color:var(--muted);margin-top:2px}
  .tile .chev{color:var(--muted);font-size:20px}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--accent-soft);color:var(--accent)}
  .badge.due{background:var(--warn-soft);color:var(--warn)}
  /* quiz rows */
  .qrow{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;width:100%;text-align:left;font:inherit;color:inherit;background:none;border-left:none;border-right:none;border-top:none}
  .qrow:first-child{border-top-left-radius:var(--radius);border-top-right-radius:var(--radius)}
  .qrow:last-child{border-bottom:none}
  .qrow:active{background:var(--surface2)}
  .qrow .mini{width:60px;flex:none}
  .qrow .grow{flex:1;min-width:0}
  .qrow .q-name{font-weight:600;font-size:15px}
  .qrow .q-sub{font-size:12.5px;color:var(--muted);margin-top:2px}
  /* session */
  .prog-top{display:flex;align-items:center;gap:12px;margin:2px 0 16px}
  .prog-top .bar{flex:1}
  .prog-top .count{font-size:13px;font-weight:700;color:var(--muted);white-space:nowrap}
  .qcard{padding:20px 18px;margin-bottom:16px}
  .qmeta{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .qmeta .type{background:var(--accent-soft);padding:2px 8px;border-radius:99px}
  .warnflag{background:var(--warn-soft);color:var(--warn);padding:2px 8px;border-radius:99px;font-size:11px}
  .stem{font-size:18px;font-weight:600;letter-spacing:-.01em;line-height:1.45}
  .opts{display:flex;flex-direction:column;gap:10px;margin-top:6px}
  .opt{
    display:flex;gap:12px;align-items:flex-start;text-align:left;width:100%;
    border:1.5px solid var(--border);background:var(--surface);color:var(--text);
    border-radius:13px;padding:14px 15px;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit;line-height:1.4;
  }
  .opt:active{transform:scale(.99)}
  .opt .key{flex:none;width:24px;height:24px;border-radius:7px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--muted);margin-top:1px}
  .opt.correct{border-color:var(--good);background:var(--good-soft)}
  .opt.correct .key{background:var(--good);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--bad-soft)}
  .opt.wrong .key{background:var(--bad);color:#fff}
  .opt.dim{opacity:.55}
  .opt[disabled]{cursor:default}
  .reveal-ans{border:1.5px solid var(--good);background:var(--good-soft);border-radius:13px;padding:15px 16px;font-size:16.5px;font-weight:600;line-height:1.5;margin-top:4px}
  .why{margin-top:14px;padding:13px 15px;background:var(--surface2);border-radius:12px;font-size:14.5px;color:var(--text)}
  .why b{color:var(--accent)}
  .why.warn{background:var(--warn-soft);color:var(--warn)}
  /* sticky action */
  .dock{position:fixed;left:0;right:0;bottom:0;z-index:30;background:linear-gradient(to top,var(--bg) 72%,transparent);padding:14px 16px calc(16px + env(safe-area-inset-bottom));}
  .dock .inner{max-width:640px;margin:0 auto}
  /* results */
  .score-hero{text-align:center;padding:30px 20px}
  .score-hero .num{font-size:54px;font-weight:800;letter-spacing:-.03em;line-height:1}
  .score-hero .sub{color:var(--muted);margin-top:8px;font-size:15px}
  .emoji{font-size:44px}
  .list-wrong{margin-top:16px}
  .wrong-item{padding:14px 16px;border-bottom:1px solid var(--border)}
  .wrong-item:last-child{border:none}
  .wrong-item .ws{font-weight:600;font-size:14.5px}
  .wrong-item .wa{font-size:13.5px;color:var(--muted);margin-top:4px}
  .wrong-item .wa b{color:var(--good)}
  .fadein{animation:fade .28s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .empty{text-align:center;color:var(--muted);padding:40px 20px}
  .empty .big{font-size:40px;margin-bottom:8px}
  a.link{color:var(--accent);text-decoration:none;font-weight:600}
  .foot{margin-top:26px;text-align:center;color:var(--muted);font-size:12.5px;line-height:1.7}
  kbd{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:1px 6px;font-size:12px;font-family:inherit}
</style>
</head>
<body>
<header class="top">
  <div class="brand"><span class="dot">✚</span><span>BN1 Drill</span><span class="ver" id="ver"></span></div>
  <div class="spacer"></div>
  <button class="iconbtn" id="streakBtn" title="Day streak"><span class="streak">🔥 <span id="streakN">0</span></span></button>
  <button class="iconbtn" id="themeBtn" title="Light / dark">🌙</button>
</header>
<main class="wrap" id="app"></main>

<script>window.BN1_QUESTIONS=[{"code":"ANAT-1","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Anatomical Terminology","stem":"What does the prefix hyper‑ mean in medical terminology?","type":"mcq","options":["around","above normal","painful","below normal"],"answer":1,"why":"hyper- = above/excessive normal (e.g. hypertension = high BP). Opposite of hypo- (below normal).","check":false},{"code":"ANAT-2","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Anatomical Terminology","stem":"The term hypothermia refers to:","type":"mcq","options":["a normal body temperature","decreased body temperature","increased body temperature","a fluctuating body temperature"],"answer":1,"why":"hypo- (below) + therm (heat) = below-normal body temperature.","check":false},{"code":"ANAT-3","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Anatomical Terminology","stem":"What does the suffix ‑emia indicate?","type":"mcq","options":["disease","tumour","blood condition","genetic condition"],"answer":2,"why":"-aemia/-emia = a condition of the blood (e.g. anaemia, hyperglycaemia).","check":false},{"code":"ANAT-4","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Anatomical Terminology","stem":"A patient diagnosed with hyperglycaemia is experiencing:","type":"mcq","options":["high blood sugar","low blood sugar","overproduction of insulin","normal blood sugar"],"answer":0,"why":"hyper- (high) + glyc (sugar/glucose) + -aemia (blood) = high blood sugar.","check":false},{"code":"ANAT-5","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Anatomical Terminology","stem":"A pressure injury is documented as being on the posterior aspect of the patient’s pelvis. This means it is located:","type":"mcq","options":["near the midline","on the side","on the back","at the front"],"answer":2,"why":"posterior = towards the back (dorsal). Anterior = front.","check":false},{"code":"ANAT-6","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Anatomical Terminology","stem":"Which directional term means away from the midline of the body?","type":"mcq","options":["distal","medial","supine","lateral"],"answer":3,"why":"lateral = away from the midline; medial = towards it.","check":false},{"code":"ANAT-7","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Anatomical Terminology","stem":"The sternum (breastbone) is medial to the ribs. This means the sternum is:","type":"mcq","options":["closer to the midline of the body","closer towards the head","closer to the side of the body","closer to the feet"],"answer":0,"why":"medial means nearer the midline, so the sternum sits closer to the body's midline than the ribs.","check":false},{"code":"ANAT-8","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Anatomical Terminology","stem":"When documenting an injury, the nurse notes that a laceration is located proximal to the patient’s wrist. This means the injury is:","type":"mcq","options":["on the fingers","on the opposite limb","away from the trunk","closer to the trunk"],"answer":3,"why":"proximal = nearer the trunk/point of attachment; distal = further away.","check":false},{"code":"ANAT-9","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Anatomical Terminology","stem":"A nurse documents that a wound is superficial. This indicates the wound:","type":"mcq","options":["involves muscle and bone","is deep within body tissues","is close to the skin surface","is located near the midline"],"answer":2,"why":"superficial = near the surface; deep = further in.","check":false},{"code":"ANAT-10","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Anatomical Terminology","stem":"Which sentence correctly uses directional terminology in nursing documentation?","type":"mcq","options":["“The patient reports pain everywhere.”","“The injury is sort of below the knee.”","“The wound is on the left side near the front.”","“Redness noted on anterior aspect of left lower leg.”"],"answer":3,"why":"Good documentation uses precise directional terms (anterior aspect, left lower leg), not vague words.","check":false},{"code":"ANAT-11","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Anatomical Terminology","stem":"Which cavity contains the brain?","type":"mcq","options":["abdominal cavity","cranial cavity","thoracic cavity","spinal cavity"],"answer":1,"why":"The cranial cavity (part of the dorsal cavity) houses the brain.","check":false},{"code":"ANAT-12","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Anatomical Terminology","stem":"The thoracic cavity is separated from the abdominal cavity by the:","type":"mcq","options":["diaphragm","sternum","ribs","lungs"],"answer":0,"why":"The diaphragm separates the thoracic cavity (above) from the abdominal cavity (below).","check":false},{"code":"ANAT-13","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Anatomical Terminology","stem":"Which organs are located within the thoracic cavity?","type":"mcq","options":["lungs and stomach","small and large intestines","kidneys and bladder","heart and lungs"],"answer":3,"why":"The thoracic cavity contains the heart and lungs (stomach/intestines are abdominal).","check":false},{"code":"ANAT-14","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Anatomical Terminology","stem":"The mediastinum is best described as:","type":"mcq","options":["A space between the lungs that contains the heart","A cavity containing the abdominal organs","The lower portion of the pelvic cavity","A membrane surrounding the lungs"],"answer":0,"why":"The mediastinum is the central compartment between the lungs; it contains the heart, great vessels, trachea and oesophagus.","check":false},{"code":"ANAT-15","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Anatomical Terminology","stem":"The pelvic cavity contains which of the following organs?","type":"mcq","options":["liver and rectum","bladder and reproductive organs","large intestine and pancreas","gall bladder and pancreas"],"answer":1,"why":"The pelvic cavity holds the bladder, rectum and reproductive organs.","check":false},{"code":"ANAT-16","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Anatomical Terminology","stem":"Which cavity protects organs involved in breathing and circulation?","type":"mcq","options":["thoracic cavity","cranial cavity","pelvic cavity","abdominal cavity"],"answer":0,"why":"The thoracic cavity protects the lungs (breathing) and heart (circulation).","check":false},{"code":"ANAT-17","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Anatomical Terminology","stem":"What is the correct order of the levels of organisation in the human body, from simplest to most complex?","type":"mcq","options":["Tissues → cells → organs → organ systems → organism","Cells → organs → tissues → organ systems → organism","Cells → tissues → organs → organ systems → organism","Molecules → organs → tissues → cells → organism"],"answer":2,"why":"Levels of organisation: chemical → cells → tissues → organs → organ systems → organism.","check":false},{"code":"ANAT-18","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Anatomical Terminology","stem":"Which of the following is an example of an organ system?","type":"mcq","options":["lungs","neuron","areolar tissue","respiratory system"],"answer":3,"why":"An organ system is a group of organs working together (e.g. respiratory system). A lung alone is an organ.","check":false},{"code":"CELLFN-1","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Cell Structure and Function","stem":"Nerve cells are specialised by having many branching dendrites. These dendrites:","type":"mcq","options":["increase the amount of information able to be received from other nerve cells","increase the amount of information sent to other nerve cells or muscles","increase attachment to other structures so nerves stay in place","allow the production of neuroglial cells"],"answer":0,"why":"Dendrites receive incoming signals; the single axon sends signals out. More dendrites = more inputs collected.","check":false},{"code":"CELLFN-2","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Cell Structure and Function","stem":"Nerve cells have a particular shape as do RBC. In fact, many cells have a variety of shapes to help them carry out specific jobs. Which structures help give cells their shapes?","type":"mcq","options":["endoplasmic reticulum","golgi body","microtubules","phospholipids"],"answer":2,"why":"The cytoskeleton — mainly microtubules — gives a cell its shape and internal structure.","check":false},{"code":"CELLFN-3","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Cell Structure and Function","stem":"The function of the mitochondria is to:","type":"mcq","options":["digest microbes and foreign particles","store the DNA","make proteins","produce ATP (energy) for the cell"],"answer":3,"why":"Mitochondria are the 'powerhouse': they produce ATP via aerobic respiration.","check":false},{"code":"CELLFN-4","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Cell Structure and Function","stem":"Give the key structural feature of each cell type: red blood cell, phagocyte, neuron, melanocyte.","type":"reveal","answerText":"Matching: Red blood cell → biconcave shape; Phagocyte → many lysosomes (to digest microbes); Neuron → myelinated axon; Melanocyte → melanosomes (make melanin).","why":"","check":false},{"code":"CELLFN-5","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Cell Structure and Function","stem":"Phagocytes are white blood cells that engulf and break down microbes and other foreign bodies. To help with this function, they have increased numbers of an organelle which contains digestive enzymes and acid. These organelles are called:","type":"mcq","options":["lysosomes","nucleoli","golgi bodies","ribosomes"],"answer":0,"why":"Lysosomes contain digestive enzymes and acid; phagocytes have many to break down engulfed microbes.","check":false},{"code":"CELLFN-6","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Cell Structure and Function","stem":"Proteins in the cell membrane have many functions, including:","type":"mcq","options":["Cell-cell adhesion","Cell signalling","Facilitated diffusion","All of these answers are correct","Cell-cell recognition"],"answer":3,"why":"Membrane proteins do all of these: adhesion, signalling, facilitated diffusion, and cell recognition.","check":false},{"code":"CELLFN-7","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Cell Structure and Function","stem":"The cytoplasm is the:","type":"mcq","options":["fluid interior of the cell","extra-cellular fluid","fluid interior of the cell and all the organelles and inclusions of the cell","cell membrane"],"answer":2,"why":"Cytoplasm = everything inside the cell membrane except the nucleus: the cytosol PLUS all organelles and inclusions. (Cytosol alone is just the fluid.)","check":false},{"code":"CELLDIV-1","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Cell Division","stem":"Skin repairs itself by mitosis. What are the two steps of mitosis, and what is the phase called when a cell is NOT dividing?","type":"reveal","answerText":"Mitosis = karyokinesis (the nucleus/genetic material divides) then cytokinesis (the cytoplasm splits) — giving two identical daughter cells. A non-dividing cell is in INTERPHASE, when it grows and copies its DNA ready for the next division.","why":"Interphase is the longest part of the cell cycle.","check":false},{"code":"CELLDIV-2","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Cell Division","stem":"Descriptions: Which description goes with which diagram? Metaphase: The chromosomes line up across the middle (equator)of the spindle fibres Telophase: A new nuclear membrane starts to form around each set of chromatids, and the cytoplasm divides across the middle forming two new cells, with the same number of chromosomes. Anaphase: The centromeres holding the chromatids together break and the chromatids move to opposite ends (spindle poles) of the cell. Prophase: The chromatin is coiled up to show chromosomes as a pair of chromatids. The centrioles start to form spindle fibres for the chromatids to move along.","type":"reveal","answerText":"Stages of mitosis: PROPHASE — chromatin coils into visible chromosomes (paired chromatids); centrioles form spindle fibres. METAPHASE — chromosomes line up on the middle (equator) of the spindle. ANAPHASE — centromeres split; chromatids pulled to opposite poles. TELOPHASE — new nuclear membranes form around each set; cytoplasm divides (cytokinesis) into two identical cells.","why":"","check":false},{"code":"CELLDIV-3","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Cell Division","stem":"In mitosis, name the stage where chromatids are (a) lined up on the spindle equator, and (b) being pulled to opposite poles. Then list the four stages in order.","type":"reveal","answerText":"(a) On the equator = METAPHASE. (b) Moving to the poles = ANAPHASE. Order: Prophase, Metaphase, Anaphase, Telophase.","why":"Mnemonic PMAT: 'Met in the Middle, pulled Apart in Anaphase.'","check":false},{"code":"CELLDIV-4","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Cell Division","stem":"Give the single identifying feature that tells each mitosis stage apart: prophase, metaphase, anaphase, telophase.","type":"reveal","answerText":"Prophase = chromosomes condense and become visible, no equator line yet. Metaphase = chromosomes lined up single-file on the equator. Anaphase = sister chromatids split and move to opposite poles. Telophase = two new nuclei reform and the cytoplasm divides (cytokinesis).","why":"Look for the equator line: on it = metaphase, split from it = anaphase.","check":false},{"code":"CELLDIV-5","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Cell Division","stem":"Contrast mitosis and meiosis on four points: where it happens, number of daughter cells, chromosome number of the daughters, and its purpose.","type":"reveal","answerText":"MITOSIS: happens in all body tissues; 2 daughter cells; full chromosome number (diploid, 46 in humans); for growth and repair. MEIOSIS: only in ovaries/testes; 4 daughter cells; HALF the chromosomes (haploid, 23); makes gametes for sexual reproduction ('reduction division').","why":"Halving in meiosis means fertilisation restores 46 (23 + 23).","check":false},{"code":"MEMB-1","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Membrane Transport","stem":"Osmosis refers to the movement of:","type":"mcq","options":["Solutes from high to low concentration","Ions against a concentration gradient","Water across a selectively permeable membrane","Nutrients through protein channels"],"answer":2,"why":"Osmosis = movement of WATER across a selectively permeable membrane, from low to high solute concentration.","check":false},{"code":"MEMB-2","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Membrane Transport","stem":"What does concentration refer to in a solution?","type":"mcq","options":["The ability of a cell membrane to regulate ion flow","The mass of the solvent in a solution","The number of solute particles per unit volume of solvent","The amount of water molecules compared to solutes"],"answer":2,"why":"Concentration = number of solute particles per unit volume of solvent.","check":false},{"code":"MEMB-3","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Membrane Transport","stem":"Osmolarity is defined as:","type":"mcq","options":["The ability of a solution to cause osmosis","The transport of glucose into cells","The total concentration of solute particles in a solution","The movement of ions across a membrane"],"answer":2,"why":"Osmolarity = the total concentration of solute particles in a solution.","check":false},{"code":"MEMB-4","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Membrane Transport","stem":"Which of the following is an example of simple diffusion?","type":"mcq","options":["Sodium exchange via the sodium-potassium pump","Water movement through aquaporins","Oxygen crossing the lipid bilayer","Glucose transport via GLUT4"],"answer":2,"why":"Simple diffusion = small non-polar molecules (like O2) crossing the lipid bilayer directly, no protein, no ATP.","check":false},{"code":"MEMB-5","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Membrane Transport","stem":"What factor primarily drives diffusion?","type":"mcq","options":["Endocytosis","ATP hydrolysis","Membrane proteins","Concentration gradient"],"answer":3,"why":"Diffusion is driven by the concentration gradient (high → low). No ATP needed.","check":false},{"code":"MEMB-6","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Membrane Transport","stem":"Facilitated diffusion differs from simple diffusion because:","type":"mcq","options":["It moves molecules against their concentration gradient","It requires ATP","It involves membrane proteins","It only occurs in nerve cells"],"answer":2,"why":"Facilitated diffusion uses membrane transport proteins; it is still passive (down the gradient, no ATP).","check":false},{"code":"MEMB-7","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Membrane Transport","stem":"What type of molecules typically require facilitated diffusion?","type":"mcq","options":["Gases like oxygen or carbon dioxide","Large or charged molecules","Small or non-charged molecules","Glucose"],"answer":1,"why":"Large or charged/polar molecules can't cross the lipid core, so they need protein-assisted (facilitated) transport.","check":false},{"code":"MEMB-8","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Membrane Transport","stem":"Ion channels primarily function by","type":"mcq","options":["Using ATP to pump ions","Blocking ion movement altogether","Facilitating passive movement of ions","Transporting large macromolecules"],"answer":2,"why":"Ion channels allow passive movement of ions down their gradient (no ATP).","check":false},{"code":"MEMB-9","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Membrane Transport","stem":"GLUT4 is an important transporter responsible for","type":"mcq","options":["Potassium ion transport","Water movement across membranes","Glucose uptake in muscle and fat cells","Insulin secretion"],"answer":2,"why":"GLUT4 is the insulin-responsive glucose transporter in muscle and fat cells.","check":false},{"code":"MEMB-10","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Membrane Transport","stem":"Saturated solutions occur when the limit of solutes that can be dissolved is reach. A supersaturated solution can cause","type":"mcq","options":["tonsil stones","standing stones","kidney stones","gizzard stones"],"answer":2,"why":"When a solution is over-saturated, solutes can precipitate out — e.g. kidney stones.","check":false},{"code":"MEMB-11","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Membrane Transport","stem":"What happens to a cell placed in a hypotonic solution?","type":"mcq","options":["It remains unchanged","It expands as water enters the cell","It stops all membrane transport","It shrinks as water leaves the cell"],"answer":1,"why":"Hypotonic outside = fewer solutes outside, so water moves IN and the cell swells (may burst).","check":false},{"code":"MEMB-12","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Membrane Transport","stem":"A hypertonic solution generally has:","type":"mcq","options":["No impact on water movement","A higher solute concentration than inside the cell","A lower solute concentration than inside the cell","The same solute concentration as inside the cell"],"answer":1,"why":"Hypertonic = higher solute concentration than inside the cell, so water leaves and the cell shrinks.","check":false},{"code":"MEMB-13","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Membrane Transport","stem":"Which of the following best describes the key difference between diffusion and osmosis?","type":"mcq","options":["Diffusion involves the movement of solutes, whereas osmosis refers to the movement of water across a selectively permeable membrane","Osmosis requires membrane proteins, whereas diffusion does not","Diffusion involves the movement of water only, while osmosis moves any type of molecule","Osmosis occurs in gases, while diffusion is restricted to liquids"],"answer":0,"why":"Diffusion moves solutes; osmosis specifically moves water across a selectively permeable membrane.","check":false},{"code":"MEMB-14","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Membrane Transport","stem":"Which of the following best describes the key difference between diffusion and facilitated diffusion?","type":"mcq","options":["Both diffusion and facilitated diffusion rely on ion pumps to transport molecules","Facilitated diffusion moves molecules against their concentration gradient, while diffusion moves them down their gradient","Diffusion requires ATP, while facilitated diffusion does not","Diffusion occurs without membrane proteins, whereas facilitated diffusion requires specific membrane proteins"],"answer":3,"why":"Both are passive/down-gradient, but simple diffusion needs no protein whereas facilitated diffusion requires specific membrane proteins.","check":false},{"code":"MEMB-15","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Membrane Transport","stem":"Extra for experts Which of the following best describes how insulin increases GLUT4 in the cell membrane","type":"mcq","options":["Insulin activates signaling pathways that promote GLUT4 insertion into the membrane","Insulin directly binds to GLUT4 transporters, forcing them into the membrane","Insulin stimulates endocytosis of GLUT4 transporters, removing them from the membrane","Insulin inhibits glucose uptake, preventing GLUT4 transporters from reaching the membrane"],"answer":0,"why":"Insulin triggers signalling that moves GLUT4 vesicles to insert into the membrane, increasing glucose uptake.","check":false},{"code":"MEMB-16","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Membrane Transport","stem":"Why does active transport require energy?","type":"mcq","options":["It operates only in oxygen-deprived cells","It works at equilibrium","It does not involve membrane proteins","It moves substances against the concentration gradient"],"answer":3,"why":"Active transport pumps substances AGAINST their gradient, so it must spend ATP.","check":false},{"code":"MEMB-17","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Membrane Transport","stem":"The sodium-potassium pump moves:","type":"mcq","options":["3 sodium ions out and 2 potassium ions in","2 sodium ions in and 3 potassium ions out","Equal amounts of sodium and potassium","Water through the membrane"],"answer":0,"why":"The Na+/K+ pump moves 3 Na+ OUT and 2 K+ IN per ATP used.","check":false},{"code":"MEMB-18","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Membrane Transport","stem":"Ion channels primarily function by:","type":"mcq","options":["Facilitating passive movement of ions","Using ATP to pump ions","Blocking ion movement altogether","Transporting large macromolecules"],"answer":0,"why":"Ion channels facilitate the passive movement of ions down their gradient.","check":false},{"code":"TIS1-1","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues (Structure and Function 1)","stem":"Name the layers of the epidermis from deepest to most superficial. Which layer divides, and which is dead? Then: what tissue makes up the dermis and the hypodermis?","type":"reveal","answerText":"Epidermis deep to superficial: stratum BASALE (dividing stem cells) - SPINOSUM - GRANULOSUM - LUCIDUM (thick skin only) - CORNEUM (dead, keratin-filled, waterproof surface). The dermis = dense IRREGULAR connective tissue. The hypodermis = mostly ADIPOSE (fat) tissue.","why":"Only the basale divides; cells flatten, fill with keratin and die as they rise.","check":false},{"code":"TIS1-2","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues (Structure and Function 1)","stem":"Why is the epidermis classed as 'stratified squamous' epithelium, and where in it do you find the melanocytes and the dividing cells?","type":"reveal","answerText":"Stratified = many cell layers; squamous = the surface cells are flat — so 'stratified squamous'. The melanocytes (make melanin for UV protection) and the dividing stem cells both sit in the deepest layer, the stratum basale.","why":"As cells are pushed up they flatten, keratinise and die.","check":false},{"code":"TIS1-3","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues (Structure and Function 1)","stem":"Dense irregular connective tissue: where is it in the skin, how are its collagen fibres arranged, and why does that suit the dermis?","type":"reveal","answerText":"Found in the DERMIS (deep to the epidermis). Its collagen fibres run in many directions (criss-crossed / irregular), so it resists pulling forces from ALL directions — ideal for skin that gets stretched every way.","why":"Contrast dense REGULAR (parallel fibres) in tendons — strong in one direction only.","check":false},{"code":"TIS1-4","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues (Structure and Function 1)","stem":"Loose (areolar) connective tissue: how do you recognise it, where is it found, and what does it do?","type":"reveal","answerText":"Looks loose and open — sparse cells and scattered collagen + elastic fibres in a gel matrix, with fibroblasts. Found under epithelia, around vessels and organs, and in the hypodermis. It holds structures in place, cushions them, and is the main site of inflammation and immune defence.","why":"'Areolar' = little open spaces.","check":false},{"code":"TIS1-5","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues (Structure and Function 1)","stem":"Adipose tissue: how do you recognise it under the microscope, where is the fat stored in each cell, and what are its roles besides storing energy?","type":"reveal","answerText":"Cells look like empty rings ('signet-ring'): one big fat droplet fills the cell and pushes the nucleus and cytoplasm to the rim. Besides energy storage it provides insulation (heat), cushioning/protection of organs, and acts as an endocrine tissue (e.g. releases leptin).","why":"The 'empty' look is because the fat washes out during slide prep.","check":false},{"code":"TIS1-6","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues (Structure and Function 1)","stem":"Which muscle type is the arrector pili (the skin muscle that raises hairs / causes goosebumps), and what does it do?","type":"reveal","answerText":"SMOOTH muscle (involuntary). It contracts to pull the hair upright and dimple the skin ('goosebumps'), and helps squeeze sebum out of the sebaceous glands.","why":"Smooth muscle: spindle-shaped fibres, one central nucleus, no stripes/striations.","check":false},{"code":"TIS1-7","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues (Structure and Function 1)","stem":"Blood is a connective tissue. Name the granulocytes and the agranulocytes with one function each, and say why blood counts as a connective tissue.","type":"reveal","answerText":"Granulocytes: NEUTROPHILS (first responders, engulf bacteria), EOSINOPHILS (parasites and allergy), BASOPHILS (release histamine for inflammation). Agranulocytes: LYMPHOCYTES (B cells make antibodies, T cells kill infected cells), MONOCYTES (become macrophages). Blood is a connective tissue because it is cells suspended in a large extracellular MATRIX (plasma).","why":"'Never Let Monkeys Eat Bananas' — neutrophils, lymphocytes, monocytes, eosinophils, basophils by frequency.","check":false},{"code":"TIS1-8","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues (Structure and Function 1)","stem":"Name the parts of a neuron and their jobs, say what the neuroglia do, and state what is damaged in multiple sclerosis (MS).","type":"reveal","answerText":"CELL BODY (holds the nucleus, integrates signals) - DENDRITES (receive incoming signals) - AXON (carries the impulse away), usually wrapped in a MYELIN sheath that speeds conduction. Neuroglia are support cells (astrocytes support/feed, oligodendrocytes make myelin, microglia = immune defence, ependymal make CSF). In MS the MYELIN is destroyed, so impulse conduction is impaired.","why":"Grey matter = cell bodies; white matter = myelinated axons.","check":false},{"code":"TIS2-1","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"Which type of epithelium is most commonly found in the lining of the respiratory tract?","type":"mcq","options":["Transitional epithelium","Pseudostratified columnar epithelium","Stratified squamous epithelium","Simple squamous epithelium"],"answer":1,"why":"The respiratory tract is lined by pseudostratified ciliated columnar epithelium (traps and sweeps mucus).","check":false},{"code":"TIS2-2","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"What is the primary function of simple squamous epithelium?","type":"mcq","options":["Facilitation of diffusion and filtration","Secretion of mucus","Protection from mechanical stress","Absorption of nutrients"],"answer":0,"why":"Simple squamous epithelium is thin and flat — ideal for diffusion and filtration (e.g. alveoli, capillaries).","check":false},{"code":"TIS2-3","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"Which of the following is a characteristic of connective tissue?","type":"mcq","options":["It is avascular","It is specialized for contraction","It has tightly packed cells with no extracellular matrix","It has abundant extracellular matrix"],"answer":3,"why":"Connective tissue characteristically has abundant extracellular matrix between its cells.","check":false},{"code":"TIS2-4","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"Which of the following connective tissues is specialized for storing energy in the form of fat?","type":"mcq","options":["Cartilage","Adipose tissue","Bone Tissue (Osseus tissue)","Blood"],"answer":1,"why":"Adipose tissue stores energy as fat.","check":false},{"code":"TIS2-5","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"Which type of muscle tissue is under voluntary control?","type":"mcq","options":["All muscle tissues are voluntary","Smooth muscle","Skeletal muscle","Cardiac muscle"],"answer":2,"why":"Skeletal muscle is voluntary; cardiac and smooth are involuntary.","check":false},{"code":"TIS2-6","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"What is the primary role of neurons in nervous tissue?","type":"mcq","options":["Providing structural support and nourishment to neurons","Transmission of electrical signals","Formation of myelin sheaths in skeletal muscle","Initiating muscle contraction"],"answer":1,"why":"Neurons transmit electrical signals; neuroglia support them.","check":false},{"code":"TIS2-7","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"Which of the following statements best describes neurons?","type":"mcq","options":["Neurons are specialized for conducting electrical impulses.","Neurons are the only cells in the nervous system capable of mitosis.","Neurons are the primary cells involved in the formation of the blood-brain barrier.","Neurons do not require oxygen for function."],"answer":0,"why":"Neurons are specialised to conduct electrical impulses. (Most mature neurons can't divide.)","check":false},{"code":"TIS2-8","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"Which tissue type forms the outer layer of the skin?","type":"mcq","options":["Transitional epithelium","Simple cuboidal epithelium","Stratified squamous epithelium","Simple columnar epithelium"],"answer":2,"why":"The epidermis (outer skin) is stratified squamous epithelium.","check":false},{"code":"TIS2-9","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"What type of epithelial tissue is found in areas where secretion and absorption occur, such as the lining of the intestines?","type":"mcq","options":["Pseudostratified columnar epithelium","Simple columnar epithelium","Stratified squamous epithelium","Simple cuboidal epithelium"],"answer":1,"why":"Simple columnar epithelium lines the intestines for secretion and absorption.","check":false},{"code":"TIS2-10","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"In which tissue is the intercalated disk a characteristic feature?","type":"mcq","options":["Cardiac muscle","Smooth muscle","Epithelial muscle","Skeletal muscle"],"answer":0,"why":"Intercalated discs are unique to cardiac muscle (electrically couple the cells).","check":false},{"code":"TIS2-11","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"Which type of connective tissue has a matrix that is hard due to the presence of calcium salts?","type":"mcq","options":["Blood","Bone","Cartilage","Adipose tissue"],"answer":1,"why":"Bone has a hard matrix due to calcium salts (hydroxyapatite).","check":false},{"code":"TIS2-12","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"Which term refers to the process of tissue repair in which new tissue replaces lost or damaged tissue?","type":"mcq","options":["Apoptosis","Necrosis","Regeneration","Metaplasia"],"answer":2,"why":"Regeneration = replacement of lost/damaged tissue with the same tissue type.","check":false},{"code":"TIS2-13","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"The term \"basement membrane\" refers to","type":"mcq","options":["The network of fibers that maintain the structure of bone tissue","The layer of connective tissue that binds epithelial cells to underlying structures","The outer layer of skin cells","A thick layer of cartilage that supports epithelial tissue"],"answer":1,"why":"The basement membrane anchors epithelium to the underlying connective tissue.","check":false},{"code":"TIS2-14","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"\"Fibroblasts\" are best described as","type":"mcq","options":["ells that produce the extracellular matrix and collagen fibers in connective tissue","Cells responsible for transmitting nerve impulses","Cells that break down bone tissue","Cells that support and nourish neurons"],"answer":0,"why":"Fibroblasts produce the extracellular matrix and collagen fibres of connective tissue.","check":false},{"code":"TIS2-15","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"The term \"fibrosis\" refers to","type":"mcq","options":["The regeneration of nerve cells after an injury","The formation of scar tissue following injury or damage to tissue","The increased number of fat cells in adipose tissue","The formation of new blood vessels"],"answer":1,"why":"Fibrosis = formation of scar (fibrous) tissue after injury.","check":false},{"code":"TIS2-16","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"Under the microscope, give the one identifying feature that distinguishes each: adipose tissue, blood, cartilage, and lung tissue.","type":"reveal","answerText":"Adipose = empty 'signet-ring' cells (fat droplet, nucleus pushed to the rim). Blood = many red cells with scattered white cells in fluid. Cartilage = chondrocytes sitting in lacunae (little spaces) within a firm matrix. Lung = lots of open airspaces (alveoli).","why":"Ask: cells-in-fluid (blood), cells-in-lacunae (cartilage), fat-rings (adipose), or airspaces (lung)?","check":false},{"code":"TIS2-17","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"How do you tell reticular tissue, hyaline cartilage and elastic cartilage apart under the microscope?","type":"reveal","answerText":"Reticular tissue (spleen, lymph nodes) = a fine mesh of fibres packed with lymphocytes. Hyaline cartilage = smooth, glassy matrix with chondrocytes in lacunae. Elastic cartilage = the same but with obvious wavy elastic fibres in the matrix (e.g. the ear).","why":"Elastic vs hyaline: look for the wavy elastic fibres.","check":false},{"code":"TIS2-18","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"Connective-tissue fibre arrangement: how do dense regular, dense irregular and loose connective tissue differ, and give an example of each?","type":"reveal","answerText":"Dense REGULAR = fibres in tight parallel bundles - tendons/ligaments (strong in one direction). Dense IRREGULAR = fibres criss-crossed in all directions - dermis (strong in every direction). LOOSE (areolar) = few, widely spaced fibres with open gaps - sits under epithelia.","why":"Regular = one-way pull; irregular = multi-way pull; loose = packing/cushion.","check":false},{"code":"TIS2-19","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"Name the four main epithelial types by their shape/layers, and where each is typically found.","type":"reveal","answerText":"Simple squamous = single flat layer (alveoli, capillaries — thin for diffusion). Simple cuboidal = single cube-shaped layer (kidney tubules, glands). Simple columnar = single tall layer (gut lining — absorption). Stratified squamous = many layers, flat on top (skin, mouth — protection).","why":"'Simple' = one layer (function); 'stratified' = many layers (protection).","check":false},{"code":"TIS2-20","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Tissues of the Human Body (Structure and Function 2)","stem":"How can a tissue slide tell you which organ it came from? Give two worked examples.","type":"reveal","answerText":"Match the tissue to where that tissue lives. E.g. simple columnar epithelium with finger-like VILLI = small INTESTINE; many thin-walled airspaces (alveoli) = LUNG; chondrocytes in lacunae in a smooth matrix = cartilage (e.g. trachea or a joint).","why":"Identify the tissue first, then recall which organ uses it.","check":false},{"code":"MIC1-1","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 1","stem":"Bacteria are prokaryotes.","type":"mcq","options":["True","False"],"answer":0,"why":"True — bacteria are prokaryotes (no membrane-bound nucleus).","check":false},{"code":"MIC1-2","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 1","stem":"Prokaryotic cells have no nucleus.","type":"mcq","options":["True","False"],"answer":0,"why":"True — 'prokaryote' means 'before nucleus'; their DNA is free in the cytoplasm.","check":false},{"code":"MIC1-3","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 1","stem":"What is a pathogen?","type":"mcq","options":["A toxin","A protein","A disease causing organism","A cell organelle"],"answer":2,"why":"A pathogen is a disease-causing organism.","check":false},{"code":"MIC1-4","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 1","stem":"How do bacteria reproduce?","type":"mcq","options":["Budding","Replication","Binary fission","Sexual Reproduction"],"answer":2,"why":"Bacteria reproduce asexually by binary fission (one cell splits into two).","check":false},{"code":"MIC1-5","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 1","stem":"What conditions do bacteria need for growth?","type":"mcq","options":["Correct pH, temperature, oxygen levels and moisture","No answer text provided.","Agar jelly and an incubator","Around 37 degrees Celcius, neutral pH and plenty of water and oxygen"],"answer":0,"why":"Bacteria need the right pH, temperature, oxygen level and moisture. (The '37°C, neutral, water+oxygen' option is only true for some, not all bacteria.)","check":false},{"code":"MIC1-6","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 1","stem":"What is the correct order for the stages of viral replication: 3. The virus attaches to a receptor on a host cell, then the virus enters the cell. 6. The virus enters the cell. 4. The virus is dismantled, viral nucleic acid (DNA or RNA) enters the host cell nucleus. 1. The viral nucleic acid is copied many times and viral proteins are made by the cell. 2. New viruses are assembled. 5. New viruses are released from the cell (the cell often dies).","type":"mcq","options":["1, 2, 5, 4, 3, 6","2, 1, 3, 4, 5, 6","3, 5, 6, 4, 1, 2","6, 4, 5, 3, 1, 2","3, 6, 4, 1, 2, 5"],"answer":4,"why":"Viral replication order: attach (3) → enter (6) → uncoat, nucleic acid enters (4) → copy nucleic acid + make proteins (1) → assemble (2) → release (5).","check":false},{"code":"MIC1-7","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 1","stem":"Under the microscope, how do you tell bacteria, fungi and protozoa apart?","type":"reveal","answerText":"BACTERIA = tiny single cells, simple shapes (cocci/round, bacilli/rods, spirals), with NO nucleus (prokaryotes). FUNGI = larger; either threads (hyphae/mould) or budding yeast cells, WITH a nucleus. PROTOZOA = larger single-celled 'animal-like' eukaryotes, often seen moving (e.g. amoeba), WITH a nucleus.","why":"Size and a nucleus are the giveaways: bacteria are smallest and have no nucleus.","check":false},{"code":"MIC1-8","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 1","stem":"Compare bacteria, protozoa, fungi and viruses by size and structure — which is smallest, and which are actually cells?","type":"reveal","answerText":"Size, smallest to largest: VIRUS < BACTERIA < FUNGI / PROTOZOA. Viruses are NOT cells (just genetic material in a protein coat, needing a host). Bacteria are cells but prokaryotic (no nucleus). Fungi and protozoa are eukaryotic cells (have a nucleus).","why":"Only viruses are non-cellular and can't reproduce on their own.","check":false},{"code":"MIC1-9","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 1","stem":"Is a virus a living cell? Describe its basic structure and why it needs a host.","type":"reveal","answerText":"A virus is NOT a cell and is not considered fully alive on its own. It is just nucleic acid (DNA or RNA) inside a protein coat (capsid), sometimes with an outer envelope. It cannot make energy or reproduce itself, so it must hijack a host cell's machinery to replicate.","why":"This is why antibiotics (which target bacterial cells) don't work on viruses.","check":false},{"code":"MIC2-1","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"An obligate aerobe is","type":"mcq","options":["an organism that will not ever grow in oxygen","an organism that sometimes grows in oxygen","an organism that can only grow in oxygen","an organism that does not need oxygen to grow"],"answer":2,"why":"Obligate aerobe = can ONLY grow with oxygen.","check":false},{"code":"MIC2-2","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"A single celled organism that moves by extending its arms of cytoplasm is","type":"mcq","options":["a ciliate","an amoeba","a louse","a flagellate"],"answer":1,"why":"An amoeba moves by extending pseudopodia ('false feet') of cytoplasm.","check":false},{"code":"MIC2-3","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Obligate anaerobes like tetanus can","type":"mcq","options":["grow only in carbon dioxide","grow in conditions that require little oxgyen","only grow when there is no oxygen","grow in the presence of oxygen"],"answer":2,"why":"Obligate anaerobes (like tetanus/Clostridium) grow ONLY where there is no oxygen.","check":false},{"code":"MIC2-4","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"A substance produced naturally by one type of microorganism to kill or inhibit the growth of another microorganism is an","type":"mcq","options":["antibiotic","antibody","antigen","antihistamine"],"answer":0,"why":"An antibiotic is made by one microbe to kill/inhibit another (e.g. Penicillium → penicillin).","check":false},{"code":"MIC2-5","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"A foreign substance introduced into the body, activates the immune response is known as","type":"mcq","options":["an antiseptic","an antibiotic","an antigen","an antibody"],"answer":2,"why":"An antigen is a foreign substance that triggers an immune response.","check":false},{"code":"MIC2-6","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"A substance which can be used on skin or living tissue to kill or remove microbes is called a(n)","type":"mcq","options":["antiseptic","antibiotic","antihistamine","disinfectant"],"answer":0,"why":"An antiseptic kills/removes microbes on skin or living tissue (a disinfectant is for surfaces).","check":false},{"code":"MIC2-7","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Arthropods may carry infectious agents from one host to another. An example of an arthropod is","type":"mcq","options":["anthrax","the scabies mite","a tapeworm","an amoeba"],"answer":1,"why":"The scabies mite is an arthropod (a vector that can carry infection).","check":false},{"code":"MIC2-8","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"In nursing, asepsis is a very important concept, and aseptic technique is encouraged. Aseptic technique refers to","type":"mcq","options":["the absence of disease causing microbes","procedures used minimise the transfer of microorganisms","the equipment used to sterilise equipment","increasing the amount of antibodies in the blood to combat disease"],"answer":1,"why":"Aseptic technique = procedures that minimise the transfer of microorganisms.","check":false},{"code":"MIC2-9","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Asexual reproduction is","type":"mcq","options":["the ability of an organism to produce offspring which involves only one parent and produces offspring that are genetically identical to the parent","the ability of an organism to produce offspring in the absence of oxygen","the ability of an organism to produce offspring without breathing","the ability of an organism to produce offspring which involves two parents and produces offspring that are genetically identical to the parent"],"answer":0,"why":"Asexual reproduction = one parent → genetically identical offspring (clones).","check":false},{"code":"MIC2-10","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Tinea (athletes' foot) is an example of an infection caused by","type":"mcq","options":["fungi","protozoa","arthropods","bacteria"],"answer":0,"why":"Tinea (athlete's foot / ringworm) is a fungal infection.","check":false},{"code":"MIC2-11","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"The equipment used to sterilise heat resistant materials using steam under pressure is called a(n)","type":"mcq","options":["dishwasher","pressure cooker","autoclone","autoclave"],"answer":3,"why":"An autoclave sterilises using pressurised steam (121°C).","check":false},{"code":"MIC2-12","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Lymphocytes","type":"mcq","options":["engulf microbes","release histamines","make antibodies","kill parasitic worms"],"answer":2,"why":"Lymphocytes make antibodies (B-cells) and kill infected cells (T-cells).","check":false},{"code":"MIC2-13","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Yeasts reproduce by","type":"mcq","options":["budding","dimorphism","extracellular reproduction","anaerobic reproduction"],"answer":0,"why":"Yeasts reproduce asexually by budding.","check":false},{"code":"MIC2-14","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Teresa looks under the microscope at some bacteria. She notices that they are long, skinny, and are purple in colour. She correctly identifies them as","type":"mcq","options":["gram-positive, bacilli","gram-positive, cocci","gram-negative, cocci","gram-negative, bacilli"],"answer":0,"why":"Gram-positive stains purple; bacilli are rod-shaped ('long, skinny').","check":false},{"code":"MIC2-15","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"An example of a prokaryote is","type":"mcq","options":["scabies","tinea","influenza","streptococci"],"answer":3,"why":"Streptococci are bacteria = prokaryotes. (Scabies, tinea, influenza are not bacteria.)","check":false},{"code":"MIC2-16","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"A special kind of virus that can invade bacteria is","type":"mcq","options":["bacteriocidal","a basophil","a bacteriophage","a helminthe"],"answer":2,"why":"A bacteriophage is a virus that infects bacteria.","check":false},{"code":"MIC2-17","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"The process where a bacterial cell splits into two in order to reproduce is called","type":"mcq","options":["binary fusion","binary system","biogenesis","binary fission"],"answer":3,"why":"Binary fission = a bacterium splits into two to reproduce.","check":false},{"code":"MIC2-18","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"A large, pus-filled nodule that develops when the deeper areas of a hair follicle become infected with Staphylococci is called a","type":"mcq","options":["impetigo","pimple","school sore","boil"],"answer":3,"why":"A boil is a deep, pus-filled hair-follicle infection (usually Staphylococcus).","check":false},{"code":"MIC2-19","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Broad spectrum antibiotics will","type":"mcq","options":["only kill specific bacteria","kill a wide range of bacteria including natural flora","kill a wide variety of pathogens","work best on fungi and viruses"],"answer":1,"why":"Broad-spectrum antibiotics kill a wide range of bacteria — including helpful normal flora.","check":false},{"code":"MIC2-20","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"An infection caused by the yeast Candida must be treated with","type":"mcq","options":["antifungal medication","antihistamines","antiviral medication","antibiotics"],"answer":0,"why":"Candida is a yeast (fungus), so it needs antifungal medication.","check":false},{"code":"MIC2-21","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Sometimes people harbour diseases but do not show any symptoms. However, they can pass on the disease to others. These people are considered to be:","type":"mcq","options":["carriers","lucky","contraband","couriers"],"answer":0,"why":"A carrier harbours a pathogen without symptoms but can still infect others.","check":false},{"code":"MIC2-22","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"The cell wall is an outer layer of a cell that provides shape and structural support. Cell walls are seen in","type":"mcq","options":["plant and animal cells","fungal, plant and animal cells","fungal, plant and bacterial cells","bacterial cells only"],"answer":2,"why":"Cell walls occur in fungal, plant and bacterial cells (animal cells have none).","check":false},{"code":"MIC2-23","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Chicken pox is a","type":"mcq","options":["bacterial infection","fungal infection","viral infection","zoological infection"],"answer":2,"why":"Chicken pox (varicella) is a viral infection.","check":false},{"code":"MIC2-24","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"An example of a viral infection is","type":"mcq","options":["tonsilitis","ringworm","hepatitis","chlamydia"],"answer":2,"why":"Hepatitis is viral. (Tonsillitis often bacterial, ringworm fungal, chlamydia bacterial.)","check":false},{"code":"MIC2-25","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"A disease that is EASILY transmitted from one host to another is said to be","type":"mcq","options":["communicable","contagious","non-communicable","congenital"],"answer":1,"why":"Contagious = EASILY transmitted host-to-host (a subset of communicable).","check":false},{"code":"MIC2-26","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"When bacteria transfer genetic material to another by using pilli, we say this is","type":"mcq","options":["conjugation","plasmidolysis","binary fission","conjunction"],"answer":0,"why":"Conjugation = bacteria transfer DNA via a pilus.","check":false},{"code":"MIC2-27","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Megan has impetigo on her arm. Her arm brushes against Sam's arm during class, and Sam later develops impetigo too. This form of transmission was by","type":"mcq","options":["indirect contact","airborne","droplet","direct contact"],"answer":3,"why":"Skin-to-skin (arm brushing arm) = direct contact transmission.","check":false},{"code":"MIC2-28","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Maggots are sometimes used therapeutically in debridement. This is where","type":"mcq","options":["the maggots destroy body cells so that antigens are more available","the maggots release histamines to flush out the wound","the maggots kill the microbes","the maggots remove necrotic tissue"],"answer":3,"why":"Maggot (larval) debridement removes dead/necrotic tissue from a wound.","check":false},{"code":"MIC2-29","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"The chemical produced by skin that kills a range of microbes is called","type":"mcq","options":["defensin","sweat","immunoglobulins","antibodies"],"answer":0,"why":"Defensins are antimicrobial chemicals made by skin (and other epithelia).","check":false},{"code":"MIC2-30","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Spherical bacteria that occur in pairs are known as","type":"mcq","options":["streptobacilli","diplobacilli","diplococci","staphylococci"],"answer":2,"why":"Diplococci = spherical bacteria (cocci) in pairs.","check":false},{"code":"MIC2-31","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"A harmful alteration to your physiology or metabolism is referred to as","type":"mcq","options":["epidemiology","virulence","infection","disease"],"answer":3,"why":"Disease = a harmful alteration to normal physiology/metabolism.","check":false},{"code":"MIC2-32","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"The destruction or removal of harmful microbes by a chemical from non-living surfaces is called","type":"mcq","options":["sterilisation","santitation","antiseption","disinfection"],"answer":3,"why":"Disinfection = chemical removal/destruction of microbes from non-living surfaces.","check":false},{"code":"MIC2-33","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"The spread of infectious agents in airborne liquid droplets has most likely come from","type":"mcq","options":["direct contact","a nosocomial infection","someone sneezing","someone sharing a drink which has become contaminated"],"answer":2,"why":"Airborne droplets usually come from sneezing (or coughing).","check":false},{"code":"MIC2-34","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Anne accidentally rubs some soil from the garden in her eye. Her eye socket becomes infected and develops into cellulitis. This is an example of","type":"mcq","options":["an exogenous infection","an iatrogenic infection","a disseminated infection","a congential infection"],"answer":0,"why":"An exogenous infection comes from outside the body (soil into the eye).","check":false},{"code":"MIC2-35","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Some gram positive bacteria can survive hostile conditions. They do this by","type":"mcq","options":["smothering themselves with a glycocalyx layer","forming endospores","hibernating","forming endotoxins"],"answer":1,"why":"Some Gram-positive bacteria form endospores to survive hostile conditions.","check":false},{"code":"MIC2-36","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"A substance that causes fever in the body is known as","type":"mcq","options":["a prophylatic","an antibody","puerperal","a pyrogen"],"answer":3,"why":"A pyrogen is a fever-inducing substance.","check":false},{"code":"MIC2-37","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Select all that apply A microbe made up of thin filaments called hyphae are","type":"reveal","answerText":"Select all: FUNGI and MOULD. Hyphae are the thread-like filaments that make up fungi/moulds.","why":"","check":false},{"code":"MIC2-38","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"The hair like structures on bacteria that help them adhere to surfaces are called","type":"mcq","options":["fimbriae","pilli","cilia","arector pilli"],"answer":0,"why":"Fimbriae are short hair-like structures that help bacteria ADHERE to surfaces. (Pili are for conjugation.)","check":false},{"code":"MIC2-39","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Flukes and tapeworms are examples of","type":"mcq","options":["ciliates","helminthes","prokaryotes","protozoa"],"answer":1,"why":"Flukes and tapeworms are helminths (parasitic worms).","check":false},{"code":"MIC2-40","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"A dirty mop used to clean the floor is an example of a","type":"mcq","options":["fungi","fimbriae","giardia","fomite"],"answer":3,"why":"A fomite is a non-living object that carries microbes (e.g. a dirty mop).","check":false},{"code":"MIC2-41","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"An example of a eukaryotic organisms with cell walls, that are unable to make their own food by photosynthesis would be","type":"mcq","options":["Staphylococci","Penicillium","Balantidium","an amoeba"],"answer":1,"why":"Penicillium is a fungus: eukaryotic, has a cell wall, and cannot photosynthesise.","check":false},{"code":"MIC2-42","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"A structure made of polysaccharides which is found in the cell walls of some bacteria, that stops the bacteria from being phagocytosed is the","type":"mcq","options":["endospore","slime layer","glucose","cell wall"],"answer":1,"why":"A slime layer/capsule of polysaccharide helps bacteria resist phagocytosis.","check":false},{"code":"MIC2-43","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Herpes is classified as a","type":"mcq","options":["protozoa","bacteria","virus","fungi"],"answer":2,"why":"Herpes is a virus.","check":false},{"code":"MIC2-44","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Nosocomial infections are better known as","type":"mcq","options":["a sickness that makes your nose go funny","hospital strains","Health care associated infections","head colds"],"answer":2,"why":"Nosocomial = healthcare-associated (hospital-acquired) infections.","check":false},{"code":"MIC2-45","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"The rate at which a percentage of the population are affected by disease in a certain amount of time is known as","type":"mcq","options":["latent period","incubation period","incidence rate","virulence rate"],"answer":2,"why":"Incidence rate = the rate of NEW cases in a population over a set time.","check":false},{"code":"MIC2-46","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Mellanie is exposed to the chicken pox virus. It takes four or five days for spots to appear. The period of time between exposure to the virus and the appearance of these spots is known as the","type":"mcq","options":["incubation period","invasive phase","convalescing phase","prodromal period"],"answer":0,"why":"Incubation period = time between exposure and the appearance of symptoms.","check":false},{"code":"MIC2-47","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Elmo is horrified when he goes to give blood and finds that the blood bank is unable to use his blood as he has hepatitis B antibodies. Elmo is shocked because he has never suffered any of the symptoms of hepatitis B but has obviously been exposed to the virus. This is possibly an example of a","type":"mcq","options":["mixed infection","opportunistic infection","dissmeninated infection","latent infection"],"answer":3,"why":"Antibodies present but no symptoms suggests a latent (dormant/sub-clinical) infection.","check":false},{"code":"MIC2-48","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Malaria is caused by","type":"mcq","options":["arthropods","protozoa","bacteria","viruses"],"answer":1,"why":"Malaria is caused by a protozoan (Plasmodium), spread by mosquitoes.","check":false},{"code":"MIC2-49","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"A sterile area of the body is the","type":"mcq","options":["genitalia","mucosa of the mouth","lower respiratory tract","skin"],"answer":2,"why":"The lower respiratory tract is normally sterile. (Skin, mouth and genitalia carry normal flora.)","check":false},{"code":"MIC2-50","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"A strain of bacteria that is resistant to some antimicrobial drugs is","type":"mcq","options":["VERTA","MERSA","MRSA","MERTA"],"answer":2,"why":"MRSA = Methicillin-Resistant Staphylococcus Aureus (antibiotic-resistant).","check":false},{"code":"MIC2-51","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"The incidence of disease in a population is known as","type":"mcq","options":["morbidity","mortality","epidemiology","pathology"],"answer":0,"why":"Morbidity = the incidence/level of disease in a population.","check":false},{"code":"MIC2-52","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Diseases that are not spread from person to person are called","type":"mcq","options":["non-communicable","notifiable","communicable","resistant"],"answer":0,"why":"Non-communicable diseases are not spread person-to-person.","check":false},{"code":"MIC2-53","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Microbes that inhabit the body, without causing disease are called","type":"mcq","options":["microflora","normal flora","transient flora","resident flora"],"answer":1,"why":"Normal flora = microbes that normally live in/on the body without causing disease.","check":false},{"code":"MIC2-54","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Sometimes infections are caused by an organism like Candida, that does not usually cause an infection but can if the person has a suppressed immune system. These types of infections are best known as","type":"mcq","options":["nosocomial","opportunistic","bacterial","latent"],"answer":1,"why":"An opportunistic infection strikes when the immune system is weakened (e.g. Candida).","check":false},{"code":"MIC2-55","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"People are often alerted to a recent pandemic. A pandemic is","type":"mcq","options":["an epidemic that spreads worldwide","is a disease that spreads nationally","a disease easily cured with panadol","a localised infection"],"answer":0,"why":"A pandemic is an epidemic that has spread worldwide.","check":false},{"code":"MIC2-56","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"An ectoparasite is","type":"mcq","options":["an organism that breaks down dead and decaying material","an organism that lives inside its host, feeding off the nutrients supplied by the host, but does not kill the host","an organism that lives on the outside of the body that feeds off the nutrients of the host, but does not kill the host","an organism that enhances phagocytosis"],"answer":2,"why":"An ectoparasite lives ON the host's outside, feeding without killing it (e.g. lice, fleas).","check":false},{"code":"MIC2-57","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"The best example to explain the portal of entry is","type":"mcq","options":["coughing","a person whose has a low immunity","a bacterium","an uncovered surgical wound"],"answer":3,"why":"A portal of entry is where a pathogen gets in — e.g. an uncovered surgical wound.","check":false},{"code":"MIC2-58","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Select all that apply Some bacteria have become resistant to antibiotics because","type":"reveal","answerText":"Select all: (b) antibiotics were sometimes given incorrectly for viral infections, and (c) people don't finish the full course. Both drive antibiotic resistance.","why":"","check":false},{"code":"MIC2-59","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Ernies cold sore becomes infected with bacteria forming a big infected sore on his lip. This bacterial infection is an example of a","type":"mcq","options":["mixed infection","superinfection","primary infection","secondary infection"],"answer":3,"why":"A bacterial infection on top of the existing viral cold sore = a secondary infection.","check":false},{"code":"MIC2-60","module":1,"moduleName":"Module 1 · Cells, Transport, Tissues & Microbes","quiz":"Microbes 2","stem":"Measurable changes that can be observed in your patient are called","type":"mcq","options":["s
